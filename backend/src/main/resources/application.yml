# ==========================================
# AxleOps Backend — Application Configuration
# ==========================================

spring:
  application:
    name: axleops-backend

  # ─── Database ────────────────────────────────
  # Default: H2 in-memory (no setup required)
  # Switch to PostgreSQL by setting environment variables:
  #   SPRING_PROFILES_ACTIVE=postgres
  datasource:
    url: jdbc:h2:mem:axleops;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public

  # ─── Flyway Migrations ──────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ─── Jackson ────────────────────────────────
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

# ─── Server ──────────────────────────────────
server:
  port: 8080
  servlet:
    context-path: /api/v1

# ─── Actuator ────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

# ─── SpringDoc / Swagger ──────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# ─── App Custom Properties ───────────────────
app:
  jwt:
    secret: ${JWT_SECRET:axleops-dev-secret-key-change-in-production-min-256-bits-long!!}
    expiration-ms: 86400000
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000

---
# ─── PostgreSQL Profile ─────────────────────
spring:
  config:
    activate:
      on-profile: postgres

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/axleops}
    driver-class-name: org.postgresql.Driver
    username: ${DATABASE_USER:axleops}
    password: ${DATABASE_PASSWORD:axleops}

  h2:
    console:
      enabled: false

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
