# ==========================================
# AxleOps Backend — Application Configuration
# ==========================================

spring:
  application:
    name: axleops-backend

  # ─── Database (PostgreSQL — Default) ─────────
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/axleops}
    driver-class-name: org.postgresql.Driver
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:}

  h2:
    console:
      enabled: false

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public

  # ─── Flyway Migrations ──────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ─── Jackson ────────────────────────────────
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  # ─── Redis ──────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # ─── Session (Redis-backed) ─────────────────
  session:
    store-type: redis
    redis:
      namespace: axleops:sessions
    timeout: 24h

# ─── Server ──────────────────────────────────
server:
  port: 8080
  servlet:
    context-path: /api/v1

# ─── Actuator ────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

# ─── SpringDoc / Swagger ──────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# ─── App Custom Properties ───────────────────
app:
  jwt:
    secret: ${JWT_SECRET:axleops-dev-secret-key-change-in-production-min-256-bits-long!!}
    expiration-ms: 86400000
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000
