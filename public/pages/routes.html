/* ═══ HELPERS ═══ */
function getFiltered(){
  let r=ROUTES.filter(rt=>
    (clientF==="all"||rt.client===clientF)&&
    (vtF==="all"||rt.vType===vtF)&&
    (tmplF==="all"||rt.template===tmplF)&&
    (search===""||rt.route.toLowerCase().includes(search.toLowerCase())||rt.client.toLowerCase().includes(search.toLowerCase())||rt.id.toLowerCase().includes(search.toLowerCase()))
  );
  return r;
}

/* ═══ RENDER FILTERS ═══ */
function renderFilters(){

/* ═══ RENDER TABLE (grid-based, matching trip table) ═══ */
function renderTable(){
  const filtered=getFiltered();
  document.getElementById("route-count").textContent=`${filtered.length} of ${ROUTES.length} routes`;
  const table=document.getElementById("route-table-container");
  if(!table)return;

  // Header
  let html='<div style="display:grid;grid-template-columns:1.2fr 1.4fr 1fr 0.8fr 80px 90px 100px 60px;padding:12px 18px;background:#F8FAFC;border-bottom:1px solid #E2E8F0;font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.5px;">';
  html+='<span>Client</span><span>Route</span><span>Vehicle</span><span>Template</span><span style="text-align:right">Dist.</span><span style="text-align:right">Toll</span><span>Status</span><span></span></div>';

  if(filtered.length===0){
    html+='<div style="text-align:center;padding:40px;color:#94A3B8;"><div style="font-size:28px;margin-bottom:8px;">📭</div><div style="font-size:13px;font-weight:600;">No routes found</div></div>';
  } else {
    filtered.forEach(function(rt){
      const sc=statusColors[rt.status]||statusColors.Draft;
      const sel=selectedRoute&&selectedRoute.id===rt.id;
      html+='<div class="route-row" data-id="'+rt.id+'" style="display:grid;grid-template-columns:1.2fr 1.4fr 1fr 0.8fr 80px 90px 100px 60px;padding:14px 18px;border-bottom:1px solid #F1F5F9;align-items:center;cursor:pointer;transition:all .1s;'+(sel?'background:#F0F7FF;border-left:3px solid #1570EF;':'')+ '" onmouseenter="this.style.background=\'#F8FAFC\'" onmouseleave="this.style.background=\''+(sel?'#F0F7FF':'#fff')+'\'">';
      html+='<div style="font-size:12px;font-weight:600;color:#475569;">'+rt.client+'</div>';
      html+='<div><div style="font-size:13px;font-weight:700;color:#1E293B;">'+rt.route+'</div><div style="font-size:11px;color:#94A3B8;">'+rt.via+'</div></div>';
      html+='<div><span style="font-size:12px;font-family:monospace;background:#F1F5F9;padding:2px 8px;border-radius:6px;">'+rt.vType+'</span></div>';
      html+='<div>'+badge(rt.template, tmC[rt.template]==="blue"?"#EFF8FF":tmC[rt.template]==="teal"?"#F0FDF9":tmC[rt.template]==="purple"?"#F4F3FF":tmC[rt.template]==="red"?"#FEF3F2":"#F1F5F9", tmC[rt.template]==="blue"?"#175CD3":tmC[rt.template]==="teal"?"#107569":tmC[rt.template]==="purple"?"#5925DC":tmC[rt.template]==="red"?"#B42318":"#475569")+'</div>';
      html+='<div style="text-align:right;font-size:12px;font-weight:700;color:#1E293B;">'+rt.dist.toLocaleString()+' km</div>';
      html+='<div style="text-align:right;font-size:12px;font-weight:700;color:#1E293B;">'+INR(rt.toll)+'</div>';
      html+='<div><span style="display:inline-flex;align-items:center;gap:4px;background:'+sc.mid+';color:'+sc.text+';border:1px solid '+sc.border+';font-size:10px;font-weight:700;padding:3px 8px;border-radius:12px;"><span style="width:6px;height:6px;border-radius:50%;background:'+sc.dot+';"></span>'+rt.status+'</span></div>';
      html+='<div style="font-size:11px;color:#94A3B8;font-weight:700;text-align:right;">Open →</div>';
      html+='</div>';
    });
  }
  table.innerHTML=html;

  // Wire row clicks
  table.querySelectorAll('.route-row').forEach(function(row){
    row.addEventListener('click',function(){
      const rt=ROUTES.find(r=>r.id===this.getAttribute('data-id'));
      if(rt) openSlider(rt);

  });
}

/* ═══ SLIDER HELPERS (matching trip slider system) ═══ */
function _rSection(icon,title,borderColor,bg,content){
  return '<div style="border:1.5px solid '+borderColor+';border-radius:12px;margin-bottom:14px;overflow:hidden;">'
    + '<div style="background:'+(bg||'#F8FAFC')+';padding:10px 14px;border-bottom:1px solid '+borderColor+';display:flex;align-items:center;gap:8px;">'
    + '<span style="font-size:14px;">'+icon+'</span>'
    + '<span style="font-size:12px;font-weight:800;color:#1E293B;text-transform:uppercase;letter-spacing:0.5px;">'+title+'</span></div>'
    + '<div style="padding:14px;">'+content+'</div></div>';
}

function _rLbl(t,required){
  return '<div style="font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:5px;">'+t+(required?'<span style="color:#EF4444;margin-left:2px;">*</span>':'')+'</div>';
}

function _rReadField(value){
  return '<div style="width:100%;border:1.5px solid #F1F5F9;border-radius:10px;padding:10px 12px;font-size:13px;color:#1E293B;background:#F8FAFC;box-sizing:border-box;font-family:inherit;font-weight:600;min-height:42px;display:flex;align-items:center;">' + (value || '<span style="color:#CBD5E1;">—</span>') + '</div>';
}

function _rField(id,type,placeholder,value,disabled){
  return '<input id="'+id+'" type="'+(type||'text')+'" '+(value?'value="'+value+'" ':'')+' placeholder="'+(placeholder||'')+'" '+(disabled?'disabled ':'')+' style="width:100%;border:1.5px solid '+(disabled?'#F1F5F9':'#E2E8F0')+';border-radius:10px;padding:10px 12px;font-size:13px;color:'+(disabled?'#94A3B8':'#1E293B')+';background:'+(disabled?'#F8FAFC':'#fff')+';outline:none;box-sizing:border-box;font-family:inherit;" />';
}

function _rSelect(id,options,placeholder,current){
  var html = '<select id="'+id+'" style="width:100%;border:1.5px solid #E2E8F0;border-radius:10px;padding:10px 12px;font-size:13px;color:#1E293B;background:#fff;outline:none;box-sizing:border-box;font-family:inherit;cursor:pointer;">';
  html += '<option value="">'+(placeholder||'Select...')+'</option>';
  options.forEach(function(o){ html += '<option value="'+o+'"'+(o===current?' selected':'')+'>'+o+'</option>'; });
  html += '</select>';
  return html;
}

function _rTextarea(id,placeholder,value){
  return '<textarea id="'+id+'" rows="3" placeholder="'+(placeholder||'')+'" style="width:100%;border:1.5px solid #E2E8F0;border-radius:10px;padding:10px 12px;font-size:13px;color:#1E293B;background:#fff;outline:none;box-sizing:border-box;font-family:inherit;resize:vertical;min-height:60px;">'+(value||'')+'</textarea>';
}

  var s2='';

/* ═══ SLIDER SHELL (matching trip slider system) ═══ */
function closeSlider(){
  selectedRoute=null;
  sliderMode="view";
  var bd=document.getElementById('route-slider-backdrop');
  var sl=document.getElementById('route-slider-panel');
  if(bd)bd.remove();
  if(sl)sl.remove();
  renderTable();
}

function renderSlider(){
  // Remove existing
  var oldBd=document.getElementById('route-slider-backdrop');
  var oldSl=document.getElementById('route-slider-panel');
  if(oldBd)oldBd.remove();
  if(oldSl)oldSl.remove();

  if(!selectedRoute)return;
  var rt=selectedRoute;
  var isCreate=sliderMode==="create";
  var isEditing=sliderMode==="edit";

  // Backdrop
  var bd=document.createElement('div');
  bd.id='route-slider-backdrop';
  bd.style.cssText='position:fixed;inset:0;background:rgba(15,23,42,0.3);z-index:99997;animation:sliderBackdropIn 0.2s ease-out forwards;';
  bd.addEventListener('click',function(e){if(e.target===bd)closeSlider();});

  // Panel
  var sl=document.createElement('div');
  sl.id='route-slider-panel';
  sl.style.cssText='position:fixed;top:0;right:0;bottom:0;width:50vw;max-width:92vw;background:#fff;z-index:99998;display:flex;flex-direction:column;box-shadow:-6px 0 32px rgba(0,0,0,0.1);animation:sliderPanelIn 0.2s ease-out;font-family:"DM Sans",system-ui,sans-serif;';

  // Header — ONLY identity + close button, NO action buttons
  var hdr=document.createElement('div');
  hdr.style.cssText='background:#1e2a3a;padding:18px 22px;flex-shrink:0;';
  var headerTitle=isCreate?'NEW ROUTE':'ROUTE DETAIL';
  var headerSub=isCreate?'Define a new route':rt.route+' — '+rt.client;
  hdr.innerHTML='<div style="display:flex;align-items:center;justify-content:space-between;">'
    +'<div>'
    +'<div style="color:rgba(255,255,255,.65);font-size:10px;font-weight:700;letter-spacing:1.5px;margin-bottom:3px;">'+headerTitle+'</div>'
    +'<div style="color:#fff;font-size:16px;font-weight:800;">'+headerSub+'</div>'
    +(!isCreate?'<div style="font-size:12px;color:rgba(255,255,255,.5);margin-top:3px;">'+rt.vType+' · '+rt.via+' · '+rt.dist+' km · '+rt.branch+'</div>':'')
    +'</div>'
    +'<button id="route-slider-close" style="background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:8px;width:32px;height:32px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;">✕</button>'
    +'</div>';

  sl.appendChild(hdr);

  // ─── Action Bar — BELOW header, standardised component ───────────────
  var actionBar=document.createElement('div');
  actionBar.className='sl-action-bar';
  var actionBarLeftHtml='<div class="sl-action-bar-left">';
  if (!isCreate) {
    // Contextual actions on the left
    actionBarLeftHtml+='<button class="sl-action-btn" id="route-add-trip-action" style="color:#0EA5E9;border-color:rgba(14,165,233,0.25);" onclick="closeSlider();if(typeof navigateTo===\'function\')navigateTo(\'trip-create\');">🚛 Add Trip</button>';
  }
  if (isCreate) {
    actionBarLeftHtml+='<button class="sl-action-btn" id="route-create-action" style="color:#10B981;border-color:rgba(16,185,129,0.25);"><i class="fas fa-plus" style="margin-right:4px"></i>Create Route</button>';
  }
  actionBarLeftHtml+='</div>';

  var actionBarRightHtml='<div class="sl-action-bar-right">';
  if (!isCreate) {
    actionBarRightHtml+='<button class="sl-edit-toggle-btn" id="route-edit-toggle">✏️ Edit Details</button>';
  } else {
    // In create mode, the "Create Route" button IS the primary action on the left, no edit toggle needed
  }
  actionBarRightHtml+='</div>';

  actionBar.innerHTML=actionBarLeftHtml+actionBarRightHtml;
  sl.appendChild(actionBar);

  // Body
  var body=document.createElement('div');
  body.id='route-slider-body';
  body.style.cssText='flex:1;overflow-y:auto;';
  body.innerHTML=isCreate?buildRouteForm(rt):buildRouteDetail(rt);
  sl.appendChild(body);

  document.body.appendChild(bd);
  document.body.appendChild(sl);

  // ─── Events ─────────────────────────────────────────────────────────
  document.getElementById('route-slider-close').addEventListener('click',closeSlider);

  // Create Route action (for new route mode)
  var createBtn=document.getElementById('route-create-action');
  if(createBtn){
    createBtn.addEventListener('click',function(){
      closeSlider();
      if(window.showToast)showToast("Route added successfully","success");
    });
  }

  // Edit Details / Save toggle (for view/edit mode)
  var editToggle=document.getElementById('route-edit-toggle');
  if(editToggle){
    editToggle.addEventListener('click',function(){
      if(!isEditing){
        // Switch to edit mode
        isEditing=true;
        sliderMode="edit";
        editToggle.innerHTML='✓ Save Details';
        editToggle.classList.add('editing');
        body.innerHTML=buildRouteForm(rt);
      } else {
        // Save and switch back to view mode
        isEditing=false;
        sliderMode="view";
        editToggle.innerHTML='✏️ Edit Details';
        editToggle.classList.remove('editing');
        // Gather and persist values from form
        var updatedFields = {};
        var el;
        el=document.getElementById('r-client'); if(el&&el.value) updatedFields.client=el.value;
        el=document.getElementById('r-vtype'); if(el&&el.value) updatedFields.vType=el.value;
        el=document.getElementById('r-origin'); if(el&&el.value) updatedFields.origin=el.value;
        el=document.getElementById('r-opin'); if(el) updatedFields.originPin=el.value;
        el=document.getElementById('r-dest'); if(el&&el.value) updatedFields.dest=el.value;
        el=document.getElementById('r-dpin'); if(el) updatedFields.destPin=el.value;
        el=document.getElementById('r-via'); if(el) updatedFields.via=el.value;
        el=document.getElementById('r-dist'); if(el&&el.value) updatedFields.dist=Number(el.value);
        el=document.getElementById('r-dur'); if(el&&el.value) updatedFields.estTime=Number(el.value);
        el=document.getElementById('r-tmpl'); if(el&&el.value) updatedFields.template=el.value;
        el=document.getElementById('r-branch'); if(el&&el.value) updatedFields.branch=el.value;
        el=document.getElementById('r-load'); if(el) updatedFields.loadInstr=el.value;
        el=document.getElementById('r-unload'); if(el) updatedFields.unloadInstr=el.value;
        // Apply updates
        for(var k in updatedFields){ rt[k]=updatedFields[k]; }
        // Update route name
        rt.route = (rt.origin||'').split(',')[0]+' → '+(rt.dest||'').split(',')[0];
        // Re-render view
        body.innerHTML=buildRouteDetail(rt);
        if(window.showToast)showToast("Route saved successfully","success");
      }
    });
  }

  document.addEventListener('keydown',function handler(e){
    if(e.key==='Escape'){closeSlider();document.removeEventListener('keydown',handler);}
  });
}

function openSlider(rt){selectedRoute=rt;sliderMode="view";renderSlider();renderTable();}

/* ═══ EVENT BINDINGS ═══ */
function bindEvents(){
  // Filters
  document.getElementById("route-search").addEventListener("input",function(){search=this.value;renderTable();});
  document.getElementById("route-filter-client").addEventListener("change",function(){clientF=this.value;renderTable();});
  document.getElementById("route-filter-vt").addEventListener("change",function(){vtF=this.value;renderTable();});
  document.getElementById("route-filter-tmpl").addEventListener("change",function(){tmplF=this.value;renderTable();});
  // Add route button
  document.getElementById("route-add-btn").addEventListener("click",function(){
    selectedRoute={id:"NEW",client:"",route:"New Route",via:"",sc:"",origin:"",originPin:"",dest:"",destPin:"",vType:"",dist:0,estTime:"",toll:0,diesel:0,kmpl:0,trips:0,tripsMtd:0,contracts:0,branch:"",template:"Standard",risk:null,onTime:null,avgMargin:null,status:"Draft",revenue:0,avgProfit:0,loadInstr:"",unloadInstr:""};
    sliderMode="create";renderSlider();
  });
}

/* ═══ INIT ═══ */
renderFilters();
renderTable();
bindEvents();
})();
</script>
