<!-- WO-01: Work Order Kanban Board -->
<div class="page-header">
    <h1>Work Order Board</h1>
    <div class="page-header-actions">
        <button class="btn btn-secondary"><i class="fas fa-filter"></i> Filter</button>
        <button class="btn btn-primary"><i class="fas fa-plus"></i> Add Work Order</button>
    </div>
</div>

<!-- Summary Metrics -->
<div class="stats-row" style="grid-template-columns:repeat(4,1fr);">
    <div class="stat-card">
        <div class="stat-label">Open</div>
        <div class="stat-value text-blue">4</div>
        <div class="stat-change">Draft + Scheduled</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">In Progress</div>
        <div class="stat-value text-yellow">3</div>
        <div class="stat-change">Active on floor</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Waiting Parts</div>
        <div class="stat-value text-red">1</div>
        <div class="stat-change negative">Blocked</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Completed (Today)</div>
        <div class="stat-value text-green">2</div>
        <div class="stat-change positive">On target</div>
    </div>
</div>

<!-- Kanban Board -->
<div id="wo-board" style="display:grid;grid-template-columns:repeat(6,1fr);gap:12px;overflow-x:auto;">
    <!-- columns rendered by JS -->
</div>

<script>
(function(){
    const COLS = [
        {id:'draft',label:'Draft',color:'#667085',icon:'fas fa-file-alt'},
        {id:'scheduled',label:'Scheduled',color:'#1a73e8',icon:'fas fa-calendar-check'},
        {id:'inprogress',label:'In Progress',color:'#F59E0B',icon:'fas fa-tools'},
        {id:'waiting',label:'Waiting Parts',color:'#E04F5F',icon:'fas fa-clock'},
        {id:'qc',label:'Quality Check',color:'#7C3AED',icon:'fas fa-check-double'},
        {id:'done',label:'Completed',color:'#12B76A',icon:'fas fa-flag-checkered'}
    ];

    const CARDS = [
        {col:'draft',wo:'WO-2603-015',reg:'MH 12 GH 3456',vehicle:'Eicher Pro 6049',tasks:['A-Service (10,000 km Interval)'],mechanic:'Unassigned',priority:'Medium',hours:4},
        {col:'draft',wo:'WO-2603-016',reg:'KA 01 IJ 7890',vehicle:'Tata LPT 3521',tasks:['Pre-trip Inspection','Tyre pressure check'],mechanic:'Unassigned',priority:'Low',hours:2},
        {col:'scheduled',wo:'WO-2603-012',reg:'RJ 14 EF 9012',vehicle:'BharatBenz 1617',tasks:['B-Service (40,000 km)'],mechanic:'Vikram Singh',priority:'High',hours:8},
        {col:'scheduled',wo:'WO-2603-013',reg:'MH 04 QR 4567',vehicle:'Eicher Pro 3019',tasks:['Brake Pad Replacement — Front'],mechanic:'Rajesh Kumar',priority:'Medium',hours:3},
        {col:'inprogress',wo:'WO-2603-009',reg:'MH 04 AB 1234',vehicle:'Tata Prima 4928',tasks:['A-Service (10,000 km)','Oil + Filter change'],mechanic:'Deepak Patel',priority:'High',hours:4},
        {col:'inprogress',wo:'WO-2603-010',reg:'GJ 01 CD 5678',vehicle:'Ashok Leyland 3520',tasks:['B-Service (40,000km)','Air filter','Brake inspection'],mechanic:'Vikram Singh',priority:'High',hours:6},
        {col:'waiting',wo:'WO-2603-011',reg:'MP 09 KL 2345',vehicle:'Ashok Leyland 4120',tasks:['Fan Belt Replacement'],mechanic:'Rajesh Kumar',priority:'Medium',hours:2,waitPart:'Fan Belt — Gates (ETA: Mar 22)'},
        {col:'qc',wo:'WO-2603-007',reg:'GJ 05 MN 6789',vehicle:'BharatBenz 2823',tasks:['A-Service completed','Brake fluid top-up'],mechanic:'Sunil Yadav',priority:'Medium',hours:4},
        {col:'done',wo:'WO-2603-005',reg:'RJ 27 OP 0123',vehicle:'Tata Signa 4825',tasks:['Coolant flush & refill'],mechanic:'Deepak Patel',priority:'Low',hours:3},
        {col:'done',wo:'WO-2603-006',reg:'KA 05 ST 8901',vehicle:'Eicher Pro 6025',tasks:['Battery replacement','Terminal cleanup'],mechanic:'Vikram Singh',priority:'Low',hours:2}
    ];

    const priorityColors = {High:['#fef3f2','#b42318'],Medium:['#fffaeb','#b54708'],Low:['#ecfdf3','#027a48']};

    function renderBoard() {
        const board = document.getElementById('wo-board');
        if (!board) return;

        board.innerHTML = COLS.map(col => {
            const cards = CARDS.filter(c => c.col === col.id);
            return `<div class="card" style="min-width:230px;">
                <div class="card-header" style="padding:12px 14px;border-bottom:2px solid ${col.color};">
                    <div style="display:flex;align-items:center;gap:8px;">
                        <i class="${col.icon}" style="color:${col.color};font-size:13px;"></i>
                        <span style="font-size:13px;font-weight:700;">${col.label}</span>
                    </div>
                    <span style="background:${col.color}15;color:${col.color};font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;">${cards.length}</span>
                </div>
                <div class="card-body" style="padding:8px;display:flex;flex-direction:column;gap:8px;max-height:500px;overflow-y:auto;background:var(--bg-main);">
                    ${cards.length === 0
                        ? '<div style="text-align:center;color:var(--text-muted);font-size:12px;padding:20px 0;">No work orders</div>'
                        : cards.map(c => {
                            const pc = priorityColors[c.priority] || ['#f2f4f7','#667085'];
                            return `<div style="background:var(--bg-white);border:1px solid var(--border-color);border-radius:var(--border-radius);padding:12px;cursor:pointer;transition:box-shadow var(--transition-fast);" onmouseover="this.style.boxShadow='var(--shadow-md)'" onmouseout="this.style.boxShadow='none'" onclick="navigateTo('work-orders')">
                                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
                                    <span style="font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--primary);">${c.wo}</span>
                                    <span class="status-badge" style="background:${pc[0]};color:${pc[1]};font-size:10px;">${c.priority}</span>
                                </div>
                                <div style="font-weight:700;font-size:13px;margin-bottom:2px;">${c.reg}</div>
                                <div style="font-size:11px;color:var(--text-muted);margin-bottom:8px;">${c.vehicle}</div>
                                <div style="display:flex;flex-direction:column;gap:3px;margin-bottom:8px;">
                                    ${c.tasks.map(t => '<div style="font-size:11px;color:var(--text-secondary);">• ' + t + '</div>').join('')}
                                </div>
                                ${c.waitPart ? '<div style="background:#fef3f2;border-radius:var(--border-radius-sm);padding:6px 8px;font-size:11px;color:#b42318;margin-bottom:8px;">⏳ ' + c.waitPart + '</div>' : ''}
                                <div style="display:flex;justify-content:space-between;align-items:center;padding-top:6px;border-top:1px solid var(--border-color);">
                                    <div style="display:flex;align-items:center;gap:5px;">
                                        <div style="width:20px;height:20px;border-radius:50%;background:${c.mechanic === 'Unassigned' ? 'var(--bg-main)' : 'linear-gradient(135deg,#1a73e8,#4285f4)'};color:${c.mechanic === 'Unassigned' ? 'var(--text-muted)' : 'white'};font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;">${c.mechanic === 'Unassigned' ? '?' : c.mechanic.split(' ').map(w=>w[0]).join('')}</div>
                                        <span style="font-size:11px;color:var(--text-secondary);">${c.mechanic}</span>
                                    </div>
                                    <span style="font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--text-muted);">${c.hours}h</span>
                                </div>
                            </div>`;
                        }).join('')
                    }
                </div>
            </div>`;
        }).join('');
    }

    setTimeout(renderBoard, 50);
})();
</script>
