<!-- ═══════════════════════════════════════════════════════════════
     📦 ARCHIVED TRIPS — Search-first, same table layout as Active/Settled
     ═══════════════════════════════════════════════════════════════ -->

<!-- ─── HEADER ─────────────────────────────────────────────────────── -->
<div class="page-header">
    <h1>Archived Trips <span class="learn-badge"><i class="fas fa-archive" style="color:#6366F1;"></i> History</span></h1>
</div>

<!-- ─── FILTER BAR ────────────────────────────────────────────── -->
<div style="background:#fff;border:1.5px solid #E2E8F0;border-radius:14px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
    <input id="archive-search-input" placeholder="🔍 Search trips..." style="border:1.5px solid #E2E8F0;border-radius:10px;padding:8px 14px;font-size:13px;color:#1E293B;outline:none;width:220px;font-family:inherit;" />
    <select id="archive-filter-route" style="border:1.5px solid #E2E8F0;border-radius:10px;padding:8px 12px;font-size:12px;color:#1E293B;background:#fff;font-family:inherit;outline:none;cursor:pointer;min-width:160px;">
        <option value="">All Routes</option>
    </select>
    <select id="archive-filter-client" style="border:1.5px solid #E2E8F0;border-radius:10px;padding:8px 12px;font-size:12px;color:#1E293B;background:#fff;font-family:inherit;outline:none;cursor:pointer;min-width:150px;">
        <option value="">All Clients</option>
    </select>
    <button id="archive-search-btn" style="background:#1E3A5F;color:#fff;border:none;border-radius:10px;padding:8px 20px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;transition:background .15s;"
        onmouseenter="this.style.background='#162d4a'" onmouseleave="this.style.background='#1E3A5F'">
        <i class="fas fa-search"></i> Search
    </button>
    <div style="flex:1;"></div>
    <button id="archive-clear-btn" style="display:none;background:none;border:1.5px solid #E2E8F0;border-radius:10px;padding:8px 14px;font-size:12px;font-weight:600;color:#64748B;cursor:pointer;font-family:inherit;"
        onmouseenter="this.style.borderColor='#CBD5E1'" onmouseleave="this.style.borderColor='#E2E8F0'">
        <i class="fas fa-times"></i> Clear
    </button>
    <div id="archive-results-count" style="font-size:12px;font-weight:700;color:#64748B;"></div>
</div>

<!-- ─── EMPTY STATE (before search) ─────────────────────────── -->
<div id="archive-empty-state" style="background:#fff;border:1.5px solid #E2E8F0;border-radius:16px;padding:64px 24px;text-align:center;">
    <div style="font-size:36px;margin-bottom:10px;opacity:.4;">🔍</div>
    <div style="font-size:14px;font-weight:700;color:#94A3B8;">Search to find archived trips</div>
    <div style="font-size:12px;color:#CBD5E1;margin-top:4px;">Enter a Trip ID, LR number, route or client name and click Search</div>
</div>

<!-- ─── TRIP TABLE (hidden until search) ───────────────────── -->
<div id="archive-table-wrap" style="display:none;background:#fff;border:1.5px solid #E2E8F0;border-radius:16px;overflow:hidden;">
    <div id="archive-results-table"></div>
</div>

<script>
(function() {
    var hasSearched = false;

    function getAllTrips() {
        if (typeof TRIPS_DATA === 'undefined') return [];
        return TRIPS_DATA.slice();
    }

    function populateFilters() {
        var trips = getAllTrips();
        var routes = {};
        var clients = {};
        trips.forEach(function(t) {
            var routeKey = t.origin + ' → ' + t.destination;
            routes[routeKey] = true;
            clients[t.client] = true;
        });

        var routeSelect = document.getElementById('archive-filter-route');
        if (routeSelect) {
            Object.keys(routes).sort().forEach(function(r) {
                var opt = document.createElement('option');
                opt.value = r;
                opt.textContent = r;
                routeSelect.appendChild(opt);
            });
        }

        var clientSelect = document.getElementById('archive-filter-client');
        if (clientSelect) {
            Object.keys(clients).sort().forEach(function(c) {
                var opt = document.createElement('option');
                opt.value = c;
                opt.textContent = c;
                clientSelect.appendChild(opt);
            });
        }
    }

    function doSearch() {
        var query = (document.getElementById('archive-search-input').value || '').toLowerCase().trim();
        var routeFilter = document.getElementById('archive-filter-route').value;
        var clientFilter = document.getElementById('archive-filter-client').value;

        if (!query && !routeFilter && !clientFilter) {
            if (hasSearched) resetView();
            return;
        }

        var trips = getAllTrips();

        if (routeFilter) {
            trips = trips.filter(function(t) {
                return (t.origin + ' → ' + t.destination) === routeFilter;
            });
        }
        if (clientFilter) {
            trips = trips.filter(function(t) { return t.client === clientFilter; });
        }
        if (query) {
            trips = trips.filter(function(t) {
                return t.id.toLowerCase().indexOf(query) >= 0
                    || t.lr.toLowerCase().indexOf(query) >= 0
                    || t.client.toLowerCase().indexOf(query) >= 0
                    || (t.vehicle || '').toLowerCase().indexOf(query) >= 0
                    || t.origin.toLowerCase().indexOf(query) >= 0
                    || t.destination.toLowerCase().indexOf(query) >= 0;
            });
        }

        hasSearched = true;
        renderResults(trips);
    }

    function renderResults(trips) {
        document.getElementById('archive-empty-state').style.display = 'none';
        document.getElementById('archive-table-wrap').style.display = 'block';
        document.getElementById('archive-clear-btn').style.display = '';
        document.getElementById('archive-results-count').textContent = trips.length + ' trip' + (trips.length !== 1 ? 's' : '') + ' found';

        var COLORS = typeof TRIP_STATE_COLORS !== 'undefined' ? TRIP_STATE_COLORS : {};
        var table = document.getElementById('archive-results-table');
        if (!table) return;

        var html = '<div style="display:grid;grid-template-columns:90px 90px 1.2fr 1fr 1fr 100px 80px 60px;padding:12px 18px;background:#F8FAFC;border-bottom:1px solid #E2E8F0;font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.5px;">';
        html += '<span>Trip ID</span><span>LR No.</span><span>Route</span><span>Client</span><span>Vehicle</span><span>Status</span><span>Freight</span><span></span></div>';

        if (trips.length === 0) {
            html += '<div style="text-align:center;padding:40px;color:#94A3B8;"><div style="font-size:28px;margin-bottom:8px;">📭</div><div style="font-size:13px;font-weight:600;">No trips found</div></div>';
        } else {
            trips.forEach(function(t) {
                var sc = COLORS[t.status] || { mid:'#F1F5F9', text:'#475569', dot:'#94A3B8', border:'#E5E7EB' };
                html += '<div class="archive-trip-row" data-trip-id="' + t.id + '" style="display:grid;grid-template-columns:90px 90px 1.2fr 1fr 1fr 100px 80px 60px;padding:14px 18px;border-bottom:1px solid #F1F5F9;align-items:center;cursor:pointer;transition:all .1s;" onmouseenter="this.style.background=\'#F8FAFC\'" onmouseleave="this.style.background=\'#fff\'">';
                html += '<div style="font-size:12px;color:#94A3B8;font-family:monospace;">' + t.id + '</div>';
                html += '<div style="font-size:12px;color:#475569;font-family:monospace;">' + t.lr + '</div>';
                html += '<div style="font-size:13px;font-weight:700;color:#1E293B;">' + t.origin + ' → ' + t.destination + '</div>';
                html += '<div style="font-size:12px;color:#475569;font-weight:600;">' + t.client + '</div>';
                html += '<div>' + (t.vehicle ? '<span style="font-size:12px;font-family:monospace;background:#F1F5F9;padding:2px 8px;border-radius:6px;">' + t.vehicle + '</span>' : '<span style="font-size:11px;color:#94A3B8;">—</span>') + '</div>';
                html += '<div><span style="display:inline-flex;align-items:center;gap:4px;background:' + sc.mid + ';color:' + sc.text + ';border:1px solid ' + sc.border + ';font-size:10px;font-weight:700;padding:3px 8px;border-radius:12px;"><span style="width:6px;height:6px;border-radius:50%;background:' + sc.dot + ';"></span>' + t.status + '</span></div>';
                html += '<div style="font-size:12px;font-weight:700;color:#1E293B;">₹' + (t.freight||0).toLocaleString() + '</div>';
                html += '<div style="font-size:11px;color:#94A3B8;font-weight:700;text-align:right;">Open →</div>';
                html += '</div>';
            });
        }
        table.innerHTML = html;

        // Wire row clicks
        table.querySelectorAll('.archive-trip-row').forEach(function(row) {
            row.addEventListener('click', function() {
                var tripId = this.getAttribute('data-trip-id');
                if (typeof openTripDetailById === 'function') {
                    openTripDetailById(tripId);
                }
            });
        });
    }

    function resetView() {
        hasSearched = false;
        document.getElementById('archive-search-input').value = '';
        document.getElementById('archive-filter-route').value = '';
        document.getElementById('archive-filter-client').value = '';
        document.getElementById('archive-empty-state').style.display = 'block';
        document.getElementById('archive-table-wrap').style.display = 'none';
        document.getElementById('archive-clear-btn').style.display = 'none';
        document.getElementById('archive-results-count').textContent = '';
    }

    function init() {
        if (typeof TRIPS_DATA === 'undefined') { setTimeout(init, 200); return; }

        populateFilters();

        document.getElementById('archive-search-btn').addEventListener('click', doSearch);

        document.getElementById('archive-search-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') doSearch();
        });

        document.getElementById('archive-clear-btn').addEventListener('click', resetView);
    }
    init();
})();
</script>
