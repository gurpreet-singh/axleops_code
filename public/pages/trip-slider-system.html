function _tGetRole() {
  if (typeof window.getCurrentRole === 'function') {
    var r = window.getCurrentRole();
    if (r === 'fleet_manager' || r === 'operator' || r === 'driver') return 'ops';
    return 'accts';

function _tStatusBadge(status) {
  var c = TRIP_STATE_COLORS[status] || { dot:'#94A3B8', light:'#F8FAFC', text:'#475569', border:'#E5E7EB' };
  return '<span style="display:inline-flex;align-items:center;gap:5px;background:'+c.mid+';color:'+c.text+';border:1px solid '+c.border+';font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;"><span style="width:6px;height:6px;border-radius:50%;background:'+c.dot+';display:inline-block;"></span>'+status+'</span>';
}

function _tSection(icon,title,borderColor,bg,content) {
  return '<div class="sl-section-card" style="border:1.5px solid '+borderColor+';">'
    + '<div class="sl-section-card-header" style="background:'+(bg||'#F8FAFC')+';border-bottom:1px solid '+borderColor+';">'
    + '<span class="sl-section-card-icon">'+icon+'</span>'
    + '<span class="sl-section-card-title">'+title+'</span></div>'
    + '<div class="sl-section-card-body">'+content+'</div></div>';
}

function _tInfoRow(label,value,extra) {
  return '<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #F8FAFC;">'
    + '<span style="font-size:12px;color:#64748B;">'+label+'</span>'

function _tTag(label,bg,col) {

function _tField(id,type,placeholder,value,disabled) {

var _sdCounter = 0;
function _tSearchDropdownHtml(sdId, options, placeholder) {
  return '<div id="'+sdId+'" class="t-searchdd" style="position:relative;">'
    + '<input type="text" class="t-sd-input" autocomplete="off" placeholder="'+(placeholder||'Select...')+'" style="width:100%;border:1.5px solid #E2E8F0;border-radius:10px;padding:10px 34px 10px 12px;font-size:13px;color:#1E293B;background:#fff;box-sizing:border-box;font-family:inherit;outline:none;" />'
    + '<span class="t-sd-arrow" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:10px;color:#94A3B8;pointer-events:none;">▼</span>'
    + '<input type="hidden" class="t-sd-value" value="" />'
    + '</div>';
}

function _tInitSearchDropdown(sdId, options, onChange) {
  var wrap = document.getElementById(sdId);
  if (!wrap) return;
  var input = wrap.querySelector('.t-sd-input');
  var hiddenInput = wrap.querySelector('.t-sd-value');
  var arrow = wrap.querySelector('.t-sd-arrow');
  var isOpen = false;
  var dropdown = null;
  var selectedLabel = '';

  function close() {
    if (dropdown) { dropdown.remove(); dropdown = null; }
    isOpen = false;
    input.style.borderColor = '#E2E8F0';
    // Restore selected label if user didn't pick anything new
    if (hiddenInput.value && selectedLabel) {
      input.value = selectedLabel;
      input.style.color = '#1E293B';
    }
    if (arrow) arrow.textContent = '▼';
  }

  function positionDropdown() {
    if (!dropdown) return;
    var rect = input.getBoundingClientRect();
    dropdown.style.position = 'fixed';
    dropdown.style.top = (rect.bottom + 4) + 'px';
    dropdown.style.left = rect.left + 'px';
    dropdown.style.width = rect.width + 'px';
  }

  function open() {
    if (isOpen) return;
    isOpen = true;
    input.style.borderColor = '#0EA5E9';
    if (arrow) arrow.textContent = '▲';

    dropdown = document.createElement('div');
    dropdown.style.cssText = 'position:fixed;background:#fff;border:1.5px solid #E2E8F0;border-radius:10px;z-index:999999;box-shadow:0 8px 24px rgba(0,0,0,0.14);overflow:hidden;max-height:260px;overflow-y:auto;';
    document.body.appendChild(dropdown);
    positionDropdown();

    renderOptions(input.value === selectedLabel ? '' : input.value);

    // Close on outside click
    setTimeout(function(){
      document.addEventListener('click', function handler(e){
        if (!wrap.contains(e.target) && (!dropdown || !dropdown.contains(e.target))) {
          close();
          document.removeEventListener('click', handler);
        }
      });
    }, 10);
  }

  function renderOptions(q) {
    if (!dropdown) return;
    var filtered = q ? options.filter(function(o){ return o.label.toLowerCase().indexOf(q.toLowerCase()) >= 0 || (o.sub && o.sub.toLowerCase().indexOf(q.toLowerCase()) >= 0); }) : options;
    if (filtered.length === 0) {
      dropdown.innerHTML = '<div style="padding:14px;font-size:12px;color:#94A3B8;text-align:center;">No results found</div>';
      return;
    }
    var html = '';
    filtered.forEach(function(o){
      var selected = o.value === hiddenInput.value;
      html += '<div class="t-sd-opt" data-value="'+o.value+'" style="padding:10px 14px;cursor:pointer;border-bottom:1px solid #F8FAFC;font-size:12px;color:#1E293B;background:'+(selected?'#F0F7FF':'#fff')+';transition:background .1s;">'
        + '<div style="font-weight:'+(selected?'700':'500')+';">'+o.label+'</div>'
        + (o.sub ? '<div style="font-size:11px;color:#94A3B8;margin-top:1px;">'+o.sub+'</div>' : '')
        + '</div>';
    });
    dropdown.innerHTML = html;
    dropdown.querySelectorAll('.t-sd-opt').forEach(function(el){
      el.addEventListener('mouseenter', function(){ if(this.getAttribute('data-value')!==hiddenInput.value) this.style.background='#F8FAFC'; });
      el.addEventListener('mouseleave', function(){ this.style.background = this.getAttribute('data-value')===hiddenInput.value ? '#F0F7FF' : '#fff'; });
      el.addEventListener('click', function(e){
        e.stopPropagation();
        var v = this.getAttribute('data-value');
        var opt = options.find(function(o){return o.value===v;});
        hiddenInput.value = v;
        selectedLabel = opt ? opt.label : v;
        input.value = selectedLabel;
        input.style.color = '#1E293B';
        close();
        if (onChange) onChange(v);
      });
    });
  }

  // Open on click or focus
  input.addEventListener('focus', function(){ open(); });
  input.addEventListener('click', function(e){ e.stopPropagation(); if (!isOpen) open(); });

  // Filter as user types
  input.addEventListener('input', function(){
    if (!isOpen) open();
    renderOptions(this.value);
  });

  // Handle Escape
  input.addEventListener('keydown', function(e){
    if (e.key === 'Escape') { close(); input.blur(); }
  });

  // Reposition on scroll within slider
  var slider = document.getElementById('trip-slider-body');
  if (slider) {
    slider.addEventListener('scroll', function(){ if (isOpen) positionDropdown(); });
  }
}

// ─── VEHICLE TYPE-AHEAD ───────────────────────────────────────────────────────
function _tVehicleTypeahead(inputId, infoId, onResolve) {
  var input = document.getElementById(inputId);
  if (!input) return;
  var allNums = Object.keys(TRIP_VEHICLES);
  var sugBox = null;

  function closeSuggestions() { if (sugBox) { sugBox.remove(); sugBox = null; } }

  function resolve(num) {
    closeSuggestions();
    input.value = num;
    var key = allNums.find(function(k){ return k.replace(/\s/g,'') === num.replace(/\s/g,'').toUpperCase(); });
    var info = document.getElementById(infoId);
    if (key) {
      var v = TRIP_VEHICLES[key];
      input.style.borderColor = '#86EFAC'; input.style.background = '#F0FDF4';
      if (info) info.innerHTML = '<div style="background:#D1FAE5;border-radius:8px;padding:10px 12px;margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:8px;">'
        + '<div><div style="font-size:9px;color:#065F46;font-weight:700;text-transform:uppercase;">Driver</div><div style="font-size:12px;font-weight:700;color:#065F46;">'+v.driver+'</div></div>'
        + '<div><div style="font-size:9px;color:#065F46;font-weight:700;text-transform:uppercase;">Vehicle Type</div><div style="font-size:12px;font-weight:700;color:#065F46;">'+v.type+'</div></div></div>';
      if (onResolve) onResolve(key, v);
    } else {
      input.style.borderColor = '#E2E8F0'; input.style.background = '#fff';
      if (info) info.innerHTML = '';
      if (onResolve) onResolve(null, null);
    }
  }

  input.addEventListener('input', function(){
    closeSuggestions();
    var q = this.value.trim();
    if (q.length < 2) return;
    var matches = allNums.filter(function(n){ return n.toLowerCase().indexOf(q.toLowerCase()) >= 0; }).slice(0,5);
    if (matches.length === 0) return;
    sugBox = document.createElement('div');
    sugBox.style.cssText = 'position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid #E2E8F0;border-radius:10px;z-index:50;box-shadow:0 4px 16px rgba(0,0,0,0.1);overflow:hidden;margin-top:4px;';
    matches.forEach(function(num){
      var v = TRIP_VEHICLES[num];
      var route = TRIP_ROUTES.find(function(r){return r.id===v.routeId;});
      var btn = document.createElement('button');
      btn.style.cssText = 'width:100%;background:none;border:none;padding:10px 14px;text-align:left;cursor:pointer;border-bottom:1px solid #F8FAFC;display:flex;gap:10px;align-items:center;font-family:inherit;';
      btn.innerHTML = '<span>🚛</span><div><div style="font-size:13px;font-weight:700;font-family:monospace;color:#1E293B;">'+num+'</div>'
        + '<div style="font-size:11px;color:#64748B;">'+v.driver+' · '+v.type+(route?' · '+route.origin+'→'+route.destination:'')+'</div></div>';
      btn.addEventListener('mouseenter', function(){ this.style.background='#F0F7FF'; });
      btn.addEventListener('mouseleave', function(){ this.style.background='none'; });
      btn.addEventListener('mousedown', function(e){ e.preventDefault(); resolve(num); });
      sugBox.appendChild(btn);
    });
    input.parentElement.appendChild(sugBox);
  });

  input.addEventListener('blur', function(){ setTimeout(closeSuggestions, 150); });
  return resolve;
}

        if (t.delayed) html += '<span style="font-size:11px;background:#FEE2E2;color:#991B1B;padding:2px 8px;border-radius:6px;font-weight:700;">🚨 Delayed</span>';
        if (t.pod) html += '<span style="font-size:11px;background:#FEF3C7;color:#92400E;padding:2px 8px;border-radius:6px;font-weight:700;">📋 ePOD</span>';
        if (t.tripSheet) html += '<span style="font-size:11px;background:#D1FAE5;color:#065F46;padding:2px 8px;border-radius:6px;font-weight:700;">🧾 Settled</span>';

        html += '<div style="display:flex;justify-content:space-between;align-items:center;">';
        html += '<div style="display:flex;gap:12px;font-size:11px;">';
        html += '<span style="color:#64748B;">Freight: <strong style="color:#1E293B;">' + _tmoney(t.freight) + '</strong></span>';
        if (totalAdv > 0) html += '<span style="color:#64748B;">Adv: <strong style="color:#7C3AED;">' + _tmoney(totalAdv) + '</strong></span>';
        html += '</div>';
        html += '<span style="font-size:11px;color:#94A3B8;font-weight:700;">Open →</span>';
        html += '</div></div>';
      });
    }
    html += '</div>';

    body.innerHTML = html;

    // Wire search
    var searchInput = document.getElementById('t-list-search');
    if (searchInput) {
      searchInput.addEventListener('input', function() {
        searchVal = this.value;
        render();
      });
      // Keep focus after re-render
      if (searchVal) {
        searchInput.focus();
        searchInput.setSelectionRange(searchVal.length, searchVal.length);
      }
    }

    // Wire card clicks
    body.querySelectorAll('.t-trip-card').forEach(function(card) {
      card.addEventListener('mouseenter', function() {
        this.style.background = '#F8FAFC'; this.style.borderColor = '#E2E8F0';
        this.style.boxShadow = '0 2px 12px rgba(0,0,0,0.06)';
      });
      card.addEventListener('mouseleave', function() {
        this.style.background = '#fff'; this.style.borderColor = '#F1F5F9';
        this.style.boxShadow = 'none';
      });
      card.addEventListener('click', function() {
        var tripId = this.getAttribute('data-trip-id');
        var trip = TRIPS_DATA.find(function(t) { return t.id === tripId; });
        if (trip) {
          _tShowTripDetail(trip, role, function() {
            // Back to list — re-render with fresh data
            // Reset header
            var sub = document.getElementById('trip-slider-sub');
            var closeBtn = document.getElementById('trip-slider-close');
            if (closeBtn) { closeBtn.textContent = '✕'; closeBtn.onclick = _tCloseSlider; }
            render();
          });
        }
      });
    });
  }
  render();
}
</script>

    cs6 += '<div>' + _tLbl('Remarks') + _tField('t-at-remarks', 'text', 'Any notes', state.remarks || '') + '</div>';

    html += '</div>';

    html += '</div>';
    body.innerHTML = html;

    // Initialize vehicle search dropdown
    _tInitSearchDropdown('t-at-veh-sd',
      vehOptions,
      function(vehNum) {
        saveState();
        if (vehNum && TRIP_VEHICLES[vehNum]) {

          state.resolved = { num:vehNum, driver:v.driver, type:v.type };
          state.vehId = vehNum;
          // Auto-fill route from vehicle if not set

              if (consBr) { state.consignorBranchId = consBr.value; state.consignor = consBr.label; state.consignorAddr = consBr._addr; }
              else { state.consignor = r.defaultConsignor; }
              var delBr = allBranchOptions.find(function(b){ return b.label.indexOf(r.defaultConsignee) >= 0; });
              if (delBr) { state.consigneeBranchId = delBr.value; state.consignee = delBr.label; state.consigneeAddr = delBr._addr; }
              else { state.consignee = r.defaultConsignee; }
            }
          }
        } else {
          state.resolved = null;
          state.vehId = '';
        }
        render();
      }
    );

    // Pre-select vehicle if already chosen
    if (state.vehId && state.resolved) {
      var vehSdVal = document.querySelector('#t-at-veh-sd .t-sd-value');
      var vehSdInput = document.querySelector('#t-at-veh-sd .t-sd-input');
      if (vehSdVal) vehSdVal.value = state.vehId;
      if (vehSdInput) {
        vehSdInput.value = state.vehId + ' — ' + state.resolved.driver;
        vehSdInput.style.color = '#1E293B';
      }
    }

    // Initialize route search dropdown
    _tInitSearchDropdown('t-at-route-sd',
      TRIP_ROUTES.map(function(r) {
        return {
          value: r.id,
          label: r.origin + ' → ' + r.destination + ' — ' + r.client,
          sub: r.distKm + 'km · ' + (r.rateType === 'Flat' ? '₹' + r.rate.toLocaleString() : '₹' + r.rate + '/km') + ' · ' + r.freightTerms
        };
      }),
      function(routeId) {
        saveState();
        state.routeId = routeId;
        var r = TRIP_ROUTES.find(function(x){ return x.id === routeId; });
        if (r) {
          // Auto-resolve consignor/consignee from branch master
          var consBr = allBranchOptions.find(function(b){ return b.label.indexOf(r.defaultConsignor) >= 0; });
          if (consBr) { state.consignorBranchId = consBr.value; state.consignor = consBr.label; state.consignorAddr = consBr._addr; }
          else { state.consignor = r.defaultConsignor; state.consignorAddr = ''; }
          var delBr = allBranchOptions.find(function(b){ return b.label.indexOf(r.defaultConsignee) >= 0; });
          if (delBr) { state.consigneeBranchId = delBr.value; state.consignee = delBr.label; state.consigneeAddr = delBr._addr; }
          else { state.consignee = r.defaultConsignee; state.consigneeAddr = ''; }
        }
        render();
      }
    );

    // Pre-select route if already chosen
    if (state.routeId) {
      var routeSdVal = document.querySelector('#t-at-route-sd .t-sd-value');
      var routeSdInput = document.querySelector('#t-at-route-sd .t-sd-input');
      if (routeSdVal) routeSdVal.value = state.routeId;
      if (routeSdInput && route) {
        routeSdInput.value = route.origin + ' → ' + route.destination + ' — ' + route.client;
        routeSdInput.style.color = '#1E293B';
      }
    }

    // ─── Initialize Party & Stakeholder dropdowns ───────────────────────

    // Consignor dropdown
    _tInitSearchDropdown('t-at-consignor-sd', allBranchOptions, function(brId) {
      saveState();
      var br = findBranch(brId);
      if (br) {
        state.consignorBranchId = brId;
        state.consignor = br.branch.name + ' — ' + br.client.name;
        state.consignorAddr = br.branch.address;
      }
      render();
    });
    // Pre-select consignor if set
    if (state.consignorBranchId) {
      var csdVal = document.querySelector('#t-at-consignor-sd .t-sd-value');
      var csdInput = document.querySelector('#t-at-consignor-sd .t-sd-input');
      if (csdVal) csdVal.value = state.consignorBranchId;
      if (csdInput) { csdInput.value = state.consignor; csdInput.style.color = '#1E293B'; }
    }

    // Consignee dropdown
    _tInitSearchDropdown('t-at-consignee-sd', allBranchOptions, function(brId) {
      saveState();
      var br = findBranch(brId);
      if (br) {
        state.consigneeBranchId = brId;
        state.consignee = br.branch.name + ' — ' + br.client.name;
        state.consigneeAddr = br.branch.address;
      }
      render();
    });
    // Pre-select consignee if set
    if (state.consigneeBranchId) {
      var dsdVal = document.querySelector('#t-at-consignee-sd .t-sd-value');
      var dsdInput = document.querySelector('#t-at-consignee-sd .t-sd-input');
      if (dsdVal) dsdVal.value = state.consigneeBranchId;
      if (dsdInput) { dsdInput.value = state.consignee; dsdInput.style.color = '#1E293B'; }
    }

    // Billing Client dropdown
    _tInitSearchDropdown('t-at-billclient-sd', billingClientOptions, function(clientId) {
      saveState();
      state.billingClientId = clientId;
      state.billingBranchId = '';
      state.billingPartyAddr = '';
      var client = TRIP_CLIENTS.find(function(c){ return c.id === clientId; });
      if (client) { state.billingParty = client.name; }
      render();
    });
    // Pre-select billing client if set
    if (state.billingClientId) {
      var bclVal = document.querySelector('#t-at-billclient-sd .t-sd-value');
      var bclInput = document.querySelector('#t-at-billclient-sd .t-sd-input');
      if (bclVal) bclVal.value = state.billingClientId;
      if (bclInput) { bclInput.value = state.billingParty; bclInput.style.color = '#1E293B'; }
    }


    // Transporter dropdown
    _tInitSearchDropdown('t-at-transporter-sd', transporterOptions, function(transId) {
      saveState();
      state.transporterId = transId;
      var t = TRIP_TRANSPORTERS.find(function(x){ return x.id === transId; });
      if (t) { state.baCode = t.baCode; state.baName = t.name; }
      render();
    });
    // Pre-select transporter if set
    if (state.transporterId) {
      var tsdVal = document.querySelector('#t-at-transporter-sd .t-sd-value');
      var tsdInput = document.querySelector('#t-at-transporter-sd .t-sd-input');
      if (tsdVal) tsdVal.value = state.transporterId;
      var selT = TRIP_TRANSPORTERS.find(function(x){ return x.id === state.transporterId; });
      if (tsdInput && selT) { tsdInput.value = selT.name + ' (BA: ' + selT.baCode + ')'; tsdInput.style.color = '#1E293B'; }
    }

    // Cancel button
    var cancelBtn = document.getElementById('t-at-cancel');
    if (cancelBtn) cancelBtn.addEventListener('click', _tCloseSlider);

    // Save and Start Trip
    var saveBtn = document.getElementById('t-at-save');
    if (saveBtn) saveBtn.addEventListener('click', function() { doSave(false); });

    // Save and Dispatch
    var dispBtn = document.getElementById('t-at-dispatch');
    if (dispBtn) dispBtn.addEventListener('click', function() { doSave(true); });
  }

  function saveState() {
    var el;
    el = document.getElementById('t-at-lr'); if (el) state.lrNum = el.value;
    el = document.getElementById('t-at-lrdate'); if (el) state.lrDate = el.value;
    el = document.getElementById('t-at-tripdate'); if (el) state.tripDate = el.value;
    el = document.getElementById('t-at-disptime'); if (el) state.dispatchTime = el.value;
    el = document.getElementById('t-at-triptype'); if (el) state.tripType = el.value;
    // Party dropdowns — state is managed via onChange handlers, just sync dropdown hidden values
    var consignorHidden = document.querySelector('#t-at-consignor-sd .t-sd-value');
    if (consignorHidden && consignorHidden.value) state.consignorBranchId = consignorHidden.value;
    var consigneeHidden = document.querySelector('#t-at-consignee-sd .t-sd-value');
    if (consigneeHidden && consigneeHidden.value) state.consigneeBranchId = consigneeHidden.value;
    var billClientHidden = document.querySelector('#t-at-billclient-sd .t-sd-value');
    if (billClientHidden && billClientHidden.value) state.billingClientId = billClientHidden.value;
    var billBranchHidden = document.querySelector('#t-at-billbranch-sd .t-sd-value');
    if (billBranchHidden && billBranchHidden.value) state.billingBranchId = billBranchHidden.value;
    var transporterHidden = document.querySelector('#t-at-transporter-sd .t-sd-value');
    if (transporterHidden && transporterHidden.value) state.transporterId = transporterHidden.value;
    // Consignment fields
    el = document.getElementById('t-at-goods'); if (el) state.goods = el.value;
    el = document.getElementById('t-at-mattype'); if (el) state.materialType = el.value;
    el = document.getElementById('t-at-wt'); if (el) state.weightKg = el.value;
    el = document.getElementById('t-at-pkg'); if (el) state.packages = el.value;
    el = document.getElementById('t-at-val'); if (el) state.declaredVal = el.value;
    el = document.getElementById('t-at-inv'); if (el) state.invoiceNos = el.value;
    el = document.getElementById('t-at-trolly'); if (el) state.trollyQty = el.value;
    el = document.getElementById('t-at-docno'); if (el) state.documentNo = el.value;
    el = document.getElementById('t-at-permit'); if (el) state.permitNo = el.value;
    el = document.getElementById('t-at-eway'); if (el) state.ewayBillNo = el.value;
    el = document.getElementById('t-at-risktype'); if (el) state.riskType = el.value;
    el = document.getElementById('t-at-remarks'); if (el) state.remarks = el.value;
    el = document.getElementById('t-at-consignor-addr'); if (el) state.consignorAddr = el.value;
    el = document.getElementById('t-at-consignee-addr'); if (el) state.consigneeAddr = el.value;
    // Financial fields
    el = document.getElementById('t-at-freight'); if (el) state.freightAmt = el.value;
    el = document.getElementById('t-at-payterms'); if (el) state.payTerms = el.value;
    el = document.getElementById('t-at-loadnote'); if (el) state.loadingNote = el.value;
    // Vehicle from search dropdown
    var vehHidden = document.querySelector('#t-at-veh-sd .t-sd-value');
    if (vehHidden && vehHidden.value) state.vehId = vehHidden.value;
    // Route from search dropdown
    var routeHidden = document.querySelector('#t-at-route-sd .t-sd-value');
    if (routeHidden && routeHidden.value) state.routeId = routeHidden.value;
  }

  function doSave(startTrip) {
    saveState();
    if (!state.lrNum || !state.routeId) return;
    var route = TRIP_ROUTES.find(function(r){ return r.id === state.routeId; });
    if (!route) return;
    var freight = route.rateType === 'Flat' ? route.rate : route.rate * route.distKm;
    // Driver advance calculation removed, initialize empty array
    var adv = [];

    // Parse multi-invoice field
    var parsedInvoices = (state.invoiceNos || '').split(',').map(function(s){ return s.trim(); }).filter(function(s){ return s.length > 0; });

    var newTrip = {
      id: 'T-0' + (_tuid++),
      lr: state.lrNum,
      lrDate: state.lrDate,
      tripDate: state.tripDate,
      dispatchTime: state.dispatchTime || null,
      tripType: state.tripType || 'FTL',
      routeId: route.id,
      status: startTrip ? 'In Transit' : 'Created',
      client: route.client,
      origin: route.origin,
      destination: route.destination,
      team: route.team,
      vehicle: state.resolved ? state.resolved.num : null,
      driver: state.resolved ? state.resolved.driver : null,
      vtype: state.resolved ? state.resolved.type : null,
      consignor: state.consignor,
      consignorAddr: state.consignorAddr || '',
      consignee: state.consignee,
      consigneeAddr: state.consigneeAddr || '',
      billingParty: state.billingParty || '',
      billingPartyAddr: state.billingPartyAddr || '',
      baCode: state.baCode || '',
      baName: state.baName || '',
      goods: state.goods,
      weightKg: Number(state.weightKg) || 0,
      packages: Number(state.packages) || 0,
      declaredValue: Number(state.declaredVal) || 0,
      freight: Number(state.freightAmt) || freight,
      hire: null,
      freightTerms: route.freightTerms,
      payTerms: state.payTerms || 'To Pay',
      loadingNote: state.loadingNote || '',
      trollyQty: Number(state.trollyQty) || 0,
      documentNo: state.documentNo || '',
      permitNo: state.permitNo || '',
      ewayBillNo: state.ewayBillNo || '',
      riskType: state.riskType || 'Carrier Risk',
      remarks: state.remarks || '',
      materialType: state.materialType || '',
      billNo: '',
      tripSheetNo: '',
      tripSheetDate: null,
      vehicleSourceTs: null,
      vehicleDestTs: null,
      vehicleUnloadDate: null,
      billSubmitDate: null,
      billReceiveDate: null,
      invoiceNo: parsedInvoices.length === 1 ? parsedInvoices[0] : '',
      invoiceNos: parsedInvoices,
      jobEntry: null,
      advances: adv,
      expenses: [],
      pod: null,
      tripSheet: null,
      deliveryDate: null,
      invoiceAmt: null,
      paymentDate: null,
      paymentRef: null,
      delayed: false
    };

    TRIPS_DATA.unshift(newTrip);
    _tRefreshDashboardCounts();
    _tCloseSlider();
  }

  render();
}
</script>

<!-- ═══ SECTION 4: DETAIL VIEW & ALL ACTIONS ═══ -->
<script>
/* ===================================================
   TMS Trip Slider — Detail View + Action Forms
   Converts OperatorDashboard_v7.jsx TripDetail + all Actions
   =================================================== */

// ─── TRIP DETAIL VIEW ─────────────────────────────────────────────────────────
function _tShowTripDetail(trip, role, onBack) {
  var body = document.getElementById('trip-slider-body');
  if (!body) return;

  var sc = TRIP_STATE_COLORS[trip.status] || { dot:'#1E3A5F' };
  var totalAdv = trip.advances.reduce(function(s,a){ return s+a.amount; }, 0);

  // Determine available actions
  var opsActions = {
    'Created':['dispatch'],
    'In Transit':['deliver'],
    'Completed':['tripsheet'],
    'Settled':[]
  };
  var acctActions = {
    'Created':[],
    'In Transit':['advance'],
    'Completed':['tripsheet'],
    'Settled':[]
  };
  var availableActions = role === 'ops' ? (opsActions[trip.status]||[]) : (acctActions[trip.status]||[]);

  var ACTION_META = {
    dispatch:  { label:'Dispatch', icon:'🚛', color:'#0EA5E9' },
    deliver:   { label:'Mark Delivered',             icon:'✅', color:'#10B981' },
    advance:   { label:'Add Advance',               icon:'💵', color:'#7C3AED' },
    tripsheet: { label:'Trip Sheet / Settle',       icon:'🧾', color:'#D97706' },
    bill:      { label:'Raise Freight Bill',        icon:'📄', color:'#6366F1' },
    payment:   { label:'Payment Receipt',           icon:'💳', color:'#16A34A' }
  };

  // Update header tightly to save space
  var sub = document.getElementById('trip-slider-sub');
  if (sub) {
    var subHtml = '<div style="display:flex; align-items:baseline; gap:12px;">';
    subHtml += '<span>' + trip.id + ' — ' + trip.origin + ' → ' + trip.destination + '</span>';
    subHtml += '<span style="font-size:13px; font-weight:600; color:rgba(255,255,255,0.85);">' + trip.client + (trip.team ? ' · ' + trip.team : '') + '</span>';
    subHtml += '</div>';
    subHtml += '<div style="display:flex; gap:10px; margin-top:5px; font-size:11px; font-weight:600; color:rgba(255,255,255,0.85);">';
    if (trip.vehicle) {
      subHtml += '<span style="background:rgba(255,255,255,0.15); padding:2px 8px; border-radius:6px; font-family:monospace;">' + trip.vtype + ' · ' + trip.vehicle + '</span>';
    } else {
      subHtml += '<span style="background:rgba(255,255,255,0.15); padding:2px 8px; border-radius:6px;">No vehicle assigned</span>';
    }
    subHtml += '<span style="background:rgba(255,255,255,0.15); padding:2px 8px; border-radius:6px;">LR: ' + _tfmtD(trip.lrDate) + '</span>';
    if (trip.pod) subHtml += '<span style="background:rgba(16,185,129,0.25); color:#A7F3D0; padding:2px 8px; border-radius:6px;">📋 ePOD</span>';
    if (trip.delayed) subHtml += '<span style="background:rgba(220,38,38,0.3); color:#FECACA; padding:2px 8px; border-radius:6px;">🚨 Delayed</span>';
    subHtml += '</div>';
    sub.innerHTML = subHtml;
  }

  // Update close button to show ← (back)
  var closeBtn = document.getElementById('trip-slider-close');
  if (closeBtn) {
    closeBtn.textContent = '←';
    closeBtn.onclick = function(){ onBack(); };
  }

  // --- Determine all available actions ---
  var detailActions = [];
  var settlementActions = [];
  var financialActions = ['tripsheet', 'bill', 'payment', 'advance'];
  availableActions.forEach(function(a) {
    if (role === 'accts' && financialActions.indexOf(a) >= 0) {
      settlementActions.push(a);
    } else {
      detailActions.push(a);
    }
  });
  var allTopActions = detailActions.concat(settlementActions);

  // --- Top action bar: ALL actions + edit — ABOVE tabs, always visible ---
  var actionBarHtml = '<div class="sl-action-bar" style="padding:12px 22px;border-bottom:1px solid #F1F5F9;background:#FAFBFC;">';
  actionBarHtml += '<div class="sl-action-bar-left">';
  allTopActions.forEach(function(a) {
    var m = ACTION_META[a];
    actionBarHtml += '<button class="sl-action-btn t-action-btn" data-action="' + a + '" style="color:' + m.color + ';border-color:' + m.color + '40;">' + m.icon + ' ' + m.label + '</button>';
  });
  actionBarHtml += '</div>';
  actionBarHtml += '<div class="sl-action-bar-right">';
  actionBarHtml += '<button class="sl-edit-toggle-btn" id="t-edit-toggle">✏️ Edit Details</button>';
  actionBarHtml += '</div>';
  actionBarHtml += '</div>';
  actionBarHtml += '<div id="t-action-area-details" class="sl-action-area"></div>';

  // --- Build Tabs UI ---
  var tabs = role === 'accts' ? ['Settlement', 'Details', 'Documents'] : ['Details', 'Documents'];
  var activeTab = tabs[0];
  var tabsHtml = '<div style="display:flex; border-bottom:1px solid #E2E8F0; margin-bottom:16px;">';
  tabs.forEach(function(t) {
    tabsHtml += '<div class="t-detail-tab" data-tab="'+t+'" style="padding:10px 18px; font-size:13px; font-weight:600; color:#64748B; border-bottom:2px solid transparent; cursor:pointer; transition:all .2s;">'+t+'</div>';
  });
  tabsHtml += '</div>';

  var detailsHtml = '';
  var settlementHtml = '';
  var docsHtml = '';

  // --- DETAILS TAB CONTENT ---
  // Paid banner
  if (trip.status === 'Settled') {
    detailsHtml += '<div style="background:#DCFCE7;border:1.5px solid #86EFAC;border-radius:12px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;">';
    detailsHtml += '<span style="font-size:20px;">🎉</span>';
    detailsHtml += '<div><div style="font-size:13px;font-weight:800;color:#14532D;">Trip Settled — Revenue Locked</div>';
    detailsHtml += '<div style="font-size:12px;color:#166534;">Expenses settled' + (trip.tripSheet ? ' on ' + _tfmtD(trip.tripSheet.settledDate) : '') + ' — this trip is now a billable line item</div></div></div>';
  }
  detailsHtml += '<div id="t-readonly-sections">';
  detailsHtml += _tTripDetailSections(trip);
  detailsHtml += '</div>';
  detailsHtml += '<div id="t-edit-sections" style="display:none;"></div>';

  // --- SETTLEMENT TAB CONTENT (Accounts Only) ---
  if (role === 'accts') {

    var ledgerEntries = [];
    trip.advances.forEach(function(a) {
      ledgerEntries.push({ date:a.date, type:'Advance', desc:a.type + ' — ' + (a.note||'Advance'), debit:a.amount, credit:0 });
    });
    if (trip.tripSheet) {
      trip.expenses.forEach(function(e) {
        ledgerEntries.push({ date:e.date, type:'Expense', desc:e.category + ' — ' + (e.note||''), debit:e.amount, credit:0 });
      });
      ledgerEntries.push({ date:trip.tripSheet.settledDate, type:'Settlement', desc:'Trip Sheet settled (' + (trip.tripSheet.note||'') + ')', debit:0, credit:0, isSettlement:true });
    }
    if (trip.invoiceAmt) ledgerEntries.push({ date:trip.deliveryDate||_ttoday(), type:'Freight Bill', desc:'Invoice ₹' + trip.invoiceAmt.toLocaleString() + ' to ' + trip.client, debit:0, credit:trip.invoiceAmt });
    if (trip.paymentDate) ledgerEntries.push({ date:trip.paymentDate, type:'Payment', desc:'Received ' + (trip.paymentRef||'—'), debit:0, credit:trip.invoiceAmt||trip.freight });

    if (ledgerEntries.length > 0) {
      var ledgerHtml = '<div style="background:#fff;border-radius:8px;overflow:hidden;">';
      ledgerHtml += '<div style="display:grid;grid-template-columns:70px 90px 1fr 80px 80px;padding:8px 12px;background:#F8FAFC;font-size:10px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.5px;">';
      ledgerHtml += '<span>Date</span><span>Type</span><span>Description</span><span style="text-align:right;">Debit</span><span style="text-align:right;">Credit</span></div>';
      ledgerEntries.forEach(function(e) {
        var typeBg = e.type==='Advance'?'#EDE9FE':e.type==='Expense'?'#FEF3C7':e.type==='Freight Bill'?'#E0E7FF':e.type==='Payment'?'#D1FAE5':'#F1F5F9';
        var typeCol = e.type==='Advance'?'#5B21B6':e.type==='Expense'?'#92400E':e.type==='Freight Bill'?'#3730A3':e.type==='Payment'?'#065F46':'#64748B';
        ledgerHtml += '<div style="display:grid;grid-template-columns:70px 90px 1fr 80px 80px;padding:7px 12px;border-top:1px solid #F1F5F9;font-size:12px;background:' + (e.isSettlement?'#FEF3C7':'transparent') + ';">';
        ledgerHtml += '<span style="color:#94A3B8;font-family:monospace;font-size:11px;">' + _tfmtD(e.date) + '</span>';
        ledgerHtml += '<span>' + _tTag(e.type, typeBg, typeCol) + '</span>';
        ledgerHtml += '<span style="color:#1E293B;font-size:11px;">' + e.desc + '</span>';
        ledgerHtml += '<span style="text-align:right;font-weight:700;color:' + (e.debit?'#DC2626':'#CBD5E1') + ';">' + (e.debit?_tmoney(e.debit):'—') + '</span>';
        ledgerHtml += '<span style="text-align:right;font-weight:700;color:' + (e.credit?'#16A34A':'#CBD5E1') + ';">' + (e.credit?_tmoney(e.credit):'—') + '</span>';
        ledgerHtml += '</div>';
      });
      ledgerHtml += '</div>';
      settlementHtml += _tSection('📊', 'Accounts Ledger', '#A5B4FC', '#EEF2FF', ledgerHtml);
    }

    // Section: Trip Sheet Settlement
    if (trip.tripSheet) {
      var tsContent = '<div style="background:#1E293B;border-radius:10px;padding:10px 14px;">';
      tsContent += '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;"><span style="color:#94A3B8;">Advances Given</span><span style="color:#F0F2FF;font-weight:700;">' + _tmoney(trip.tripSheet.totalAdv) + '</span></div>';
      tsContent += '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;"><span style="color:#94A3B8;">Expenses Incurred</span><span style="color:#F0F2FF;font-weight:700;">' + _tmoney(trip.tripSheet.totalExp) + '</span></div>';
      tsContent += '<div style="border-top:1px solid #334155;padding-top:6px;display:flex;justify-content:space-between;font-size:13px;">';
      tsContent += '<span style="color:#fff;font-weight:800;">Balance</span>';
      var bal = trip.tripSheet.balance;
      tsContent += '<span style="color:' + (bal >= 0 ? '#22C55E' : '#EF4444') + ';font-weight:800;">' + (bal >= 0 ? '₹' + bal.toLocaleString() + ' refund' : '₹' + Math.abs(bal).toLocaleString() + ' due') + '</span>';
      tsContent += '</div>';

// ─── RENDER ACTION FORM ──────────────────────────────────────────────────────
function _tRenderAction(action, trip, role, onListBack, areaId) {
  var area = document.getElementById(areaId || 't-action-area-details');
  if (!area) return;

  function applyUpdate(updates) {
    // Find trip in TRIPS_DATA and update it
    for (var i = 0; i < TRIPS_DATA.length; i++) {
      if (TRIPS_DATA[i].id === trip.id) {
        for (var k in updates) { TRIPS_DATA[i][k] = updates[k]; }
        trip = TRIPS_DATA[i];
        break;
      }
    }
    _tRefreshDashboardCounts();
    // Re-render detail
    _tShowTripDetail(trip, role, onListBack);
  }

  if (action === 'dispatch') _tActionDispatch(area, trip, applyUpdate);
  else if (action === 'deliver') _tActionDeliver(area, trip, applyUpdate);
  else if (action === 'advance') _tActionAdvance(area, trip, applyUpdate);
  else if (action === 'tripsheet') _tActionTripSheet(area, trip, applyUpdate);
  else if (action === 'bill') _tActionBill(area, trip, applyUpdate);
  else if (action === 'payment') _tActionPayment(area, trip, applyUpdate);
}

  html += '<div style="font-size:13px;font-weight:800;color:#5B21B6;margin-bottom:12px;">💵 Add Advance</div>';
  if (isHire) {
    html += '<div style="margin-bottom:10px;">' + _tLbl('Advance Type');
    html += '<div style="display:flex;gap:8px;">';
    html += '<button id="t-adv-type-driver" class="t-adv-type" data-type="Driver" style="flex:1;padding:8px;border-radius:8px;border:1.5px solid #7C3AED;background:#EDE9FE;color:#5B21B6;font-weight:700;font-size:12px;cursor:pointer;font-family:inherit;">Driver</button>';
    html += '<button id="t-adv-type-hire" class="t-adv-type" data-type="Hire Slip" style="flex:1;padding:8px;border-radius:8px;border:1.5px solid #E2E8F0;background:#fff;color:#64748B;font-weight:700;font-size:12px;cursor:pointer;font-family:inherit;">Hire Slip</button>';
    html += '</div></div>';
  }
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">';
  html += '<div>' + _tLbl('Amount (₹)', true) + _tField('t-adv-amt', 'number', '0') + '</div>';
  html += '<div>' + _tLbl('Payment Mode') + _tSearchDropdownHtml('t-adv-mode-sd', TRIP_PAYMENT_MODES, 'Select mode...') + '</div>';
  html += '</div>';
  html += '<div style="margin-bottom:12px;">' + _tLbl('Note') + _tField('t-adv-note', 'text', 'Purpose of advance') + '</div>';
  html += _tBtn('t-adv-save', 'Save Advance', '#7C3AED', false, false);
  html += '</div>';

  area.innerHTML = html;

  var advType = 'Driver';
  _tInitSearchDropdown('t-adv-mode-sd', TRIP_PAYMENT_MODES.map(function(m){ return {value:m,label:m}; }));

  if (isHire) {
    area.querySelectorAll('.t-adv-type').forEach(function(btn) {
      btn.addEventListener('click', function() {
        advType = this.getAttribute('data-type');
        area.querySelectorAll('.t-adv-type').forEach(function(b) {
          if (b.getAttribute('data-type') === advType) {
            b.style.borderColor = '#7C3AED'; b.style.background = '#EDE9FE'; b.style.color = '#5B21B6';
          } else {
            b.style.borderColor = '#E2E8F0'; b.style.background = '#fff'; b.style.color = '#64748B';
          }
        });
      });
    });
  }

  document.getElementById('t-adv-save').addEventListener('click', function() {
    var amt = document.getElementById('t-adv-amt').value;
    if (!amt) return;
    var modeHidden = document.querySelector('#t-adv-mode-sd .t-sd-value');
    var mode = modeHidden ? modeHidden.value : '';
    var note = document.getElementById('t-adv-note').value;
    var newAdv = { id:'adv'+Date.now(), type:advType, amount:Number(amt), mode:mode, date:_ttoday(), note:note };
    applyUpdate({ advances: trip.advances.concat([newAdv]) });
  });
}

// ─── ACTION: TRIP SHEET / SETTLE ─────────────────────────────────────────────
function _tActionTripSheet(area, trip, applyUpdate) {
  var totalAdv = trip.advances.reduce(function(s,a){ return s+a.amount; }, 0);
  var prevTotalExp = trip.expenses.reduce(function(s,e){ return s+e.amount; }, 0);
  var newExpenses = [];

  function render() {
    var allExp = prevTotalExp + newExpenses.reduce(function(s,e){ return s+e.amount; }, 0);
    var balance = totalAdv - allExp;

    var html = '<div style="background:#FFFBEB;border:1.5px solid #FCD34D;border-radius:12px;padding:16px;margin-bottom:16px;">';
    html += '<div style="font-size:13px;font-weight:800;color:#92400E;margin-bottom:4px;">🧾 Trip Sheet — Expense Settlement</div>';
    html += '<div style="font-size:11px;color:#64748B;margin-bottom:14px;">Log all trip expenses and settle against advances given to the driver.</div>';

    // Previously logged
    if (trip.expenses.length > 0) {
      html += '<div style="margin-bottom:12px;"><div style="font-size:10px;font-weight:700;color:#94A3B8;margin-bottom:6px;">PREVIOUSLY LOGGED</div>';
      trip.expenses.forEach(function(e) {
        html += '<div style="background:#fff;border-radius:6px;padding:6px 10px;margin-bottom:4px;font-size:12px;display:flex;justify-content:space-between;">';
        html += '<span style="color:#64748B;">' + e.category + ' — ' + (e.note||'') + '</span><strong style="color:#D97706;">' + _tmoney(e.amount) + '</strong></div>';
      });
      html += '</div>';
    }

    // Add expense form
    html += '<div style="font-size:10px;font-weight:700;color:#94A3B8;margin-bottom:6px;">ADD EXPENSE</div>';
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px;">';
    html += '<div>' + _tLbl('Category') + _tSearchDropdownHtml('t-ts-cat-sd', TRIP_EXPENSE_CATS, 'Select category...') + '</div>';
    html += '<div>' + _tLbl('Amount (₹)') + _tField('t-ts-amt', 'number', '0') + '</div>';
    html += '<div>' + _tLbl('Date') + _tField('t-ts-date', 'date', '', _ttoday()) + '</div>';
    html += '<div>' + _tLbl('Note') + _tField('t-ts-enote', 'text', 'Details') + '</div>';
    html += '</div>';
    html += '<div style="margin-bottom:12px;">' + _tBtn('t-ts-add', '+ Add Expense Line', '#475569', false, true) + '</div>';

    // New expenses
    if (newExpenses.length > 0) {
      html += '<div style="margin-bottom:12px;"><div style="font-size:10px;font-weight:700;color:#94A3B8;margin-bottom:6px;">NEW EXPENSES</div>';
      newExpenses.forEach(function(e) {
        html += '<div style="background:#FEF3C7;border-radius:6px;padding:6px 10px;margin-bottom:4px;font-size:12px;display:flex;justify-content:space-between;">';
        html += '<span style="color:#92400E;">' + e.category + ' — ' + (e.note||'—') + '</span><strong style="color:#D97706;">' + _tmoney(e.amount) + '</strong></div>';
      });
      html += '</div>';
    }

    // Settlement summary
    html += '<div style="background:#1E293B;border-radius:10px;padding:12px 14px;margin-bottom:12px;">';
    html += '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;"><span style="color:#94A3B8;">Total Advances</span><span style="color:#F0F2FF;font-weight:700;">' + _tmoney(totalAdv) + '</span></div>';
    html += '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;"><span style="color:#94A3B8;">Total Expenses</span><span style="color:#F0F2FF;font-weight:700;">' + _tmoney(allExp) + '</span></div>';
    html += '<div style="border-top:1px solid #334155;padding-top:8px;display:flex;justify-content:space-between;font-size:14px;">';
    html += '<span style="color:#fff;font-weight:800;">Balance</span>';
    html += '<span style="color:' + (balance >= 0 ? '#22C55E' : '#EF4444') + ';font-weight:800;">' + (balance >= 0 ? '₹' + balance.toLocaleString() + ' refund from driver' : '₹' + Math.abs(balance).toLocaleString() + ' due to driver') + '</span>';
    html += '</div></div>';
    html += '<div style="margin-bottom:12px;">' + _tLbl('Settlement Note') + _tField('t-ts-settle-note', 'text', 'e.g. Cash settled, balance adjusted next trip') + '</div>';
    html += _tBtn('t-ts-go', '✓ Settle Trip Sheet', '#D97706', false, false);
    html += '</div>';

    area.innerHTML = html;

    _tInitSearchDropdown('t-ts-cat-sd', TRIP_EXPENSE_CATS.map(function(c){ return {value:c,label:c}; }));

    document.getElementById('t-ts-add').addEventListener('click', function() {
      var catHidden = document.querySelector('#t-ts-cat-sd .t-sd-value');
      var cat = catHidden ? catHidden.value : '';
      var amt = document.getElementById('t-ts-amt').value;
      if (!cat || !amt) return;
      newExpenses.push({ id:'exp'+Date.now(), category:cat, amount:Number(amt), date:document.getElementById('t-ts-date').value, note:document.getElementById('t-ts-enote').value });
      render();
    });

    document.getElementById('t-ts-go').addEventListener('click', function() {
      var allExpTotal = prevTotalExp + newExpenses.reduce(function(s,e){ return s+e.amount; }, 0);
      var bal = totalAdv - allExpTotal;
      var settleNote = document.getElementById('t-ts-settle-note').value;
      applyUpdate({
        status: 'Settled',
        expenses: trip.expenses.concat(newExpenses),
        tripSheet: { settledDate:_ttoday(), totalAdv:totalAdv, totalExp:allExpTotal, balance:bal, note:settleNote }
      });
    });
  }
  render();
}

// ─── ACTION: RAISE FREIGHT BILL ──────────────────────────────────────────────
function _tActionBill(area, trip, applyUpdate) {
  var base = trip.freight;
  var html = '<div style="background:#EEF2FF;border:1.5px solid #A5B4FC;border-radius:12px;padding:16px;margin-bottom:16px;">';
  html += '<div style="font-size:13px;font-weight:800;color:#3730A3;margin-bottom:8px;">📄 Raise Freight Bill</div>';
  // Auto-populated
  html += '<div style="background:#fff;border-radius:8px;padding:10px 12px;margin-bottom:12px;">';
  html += _tInfoRow('Base Freight', _tmoney(base), ' ' + _tTag('AUTO', '#D1FAE5', '#065F46'));
  html += _tInfoRow('Client', trip.client, ' ' + _tTag('AUTO', '#D1FAE5', '#065F46'));
  html += _tInfoRow('Freight Terms', trip.freightTerms, ' ' + _tTag('AUTO', '#D1FAE5', '#065F46'));
  html += '</div>';
  // Input fields
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">';
  html += '<div>' + _tLbl('Detention (₹)') + _tField('t-bill-det', 'number', '0') + '</div>';
  html += '<div>' + _tLbl('Loading Charges (₹)') + _tField('t-bill-load', 'number', '0') + '</div>';
  html += '<div>' + _tLbl('Other Charges (₹)') + _tField('t-bill-other', 'number', '0') + '</div>';
  html += '<div>' + _tLbl('GST %') + _tSelect('t-bill-gst', ['0% — Exempt','5%','12%','18%'], '') + '</div>';
  html += '<div>' + _tLbl('Bill Date') + _tField('t-bill-date', 'date', '', _ttoday()) + '</div>';
  html += '</div>';
  // Calculation
  html += '<div id="t-bill-calc" style="background:#1E293B;border-radius:10px;padding:12px 14px;margin-bottom:12px;"></div>';
  html += _tBtn('t-bill-go', 'Generate Invoice', '#6366F1', false, false);
  html += '</div>';

  area.innerHTML = html;

  // Set default GST to 5%
  document.getElementById('t-bill-gst').value = '5%';

  function calc() {
    var det = Number(document.getElementById('t-bill-det').value) || 0;
    var load = Number(document.getElementById('t-bill-load').value) || 0;
    var other = Number(document.getElementById('t-bill-other').value) || 0;
    var gstStr = document.getElementById('t-bill-gst').value;
    var gstPct = parseInt(gstStr) || 0;
    var sub = base + det + load + other;
    var gstAmt = Math.round(sub * gstPct / 100);
    var total = sub + gstAmt;
    var calcDiv = document.getElementById('t-bill-calc');
    calcDiv.innerHTML = '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;"><span style="color:#94A3B8;">Sub-total</span><span style="color:#F0F2FF;font-weight:700;">₹' + sub.toLocaleString() + '</span></div>'
      + '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;"><span style="color:#94A3B8;">GST (' + gstPct + '%)</span><span style="color:#F0F2FF;font-weight:700;">₹' + gstAmt.toLocaleString() + '</span></div>'
      + '<div style="border-top:1px solid #334155;padding-top:8px;display:flex;justify-content:space-between;font-size:15px;">'
      + '<span style="color:#fff;font-weight:800;">Invoice Total</span>'
      + '<span style="color:#22C55E;font-weight:800;">₹' + total.toLocaleString() + '</span></div>';
    return total;
  }
  calc();
  ['t-bill-det','t-bill-load','t-bill-other'].forEach(function(id) {
    document.getElementById(id).addEventListener('input', calc);
  });
  document.getElementById('t-bill-gst').addEventListener('change', calc);

  document.getElementById('t-bill-go').addEventListener('click', function() {
    var total = calc();
    applyUpdate({ status:'Settled', invoiceAmt:total });
  });
}

// ─── ACTION: PAYMENT RECEIPT ─────────────────────────────────────────────────
function _tActionPayment(area, trip, applyUpdate) {
  var invAmt = trip.invoiceAmt || trip.freight;
  var html = '<div style="background:#F0FDF4;border:1.5px solid #86EFAC;border-radius:12px;padding:16px;margin-bottom:16px;">';
  html += '<div style="font-size:13px;font-weight:800;color:#14532D;margin-bottom:8px;">💳 Payment Receipt</div>';
  html += '<div style="background:#fff;border-radius:8px;padding:10px 12px;margin-bottom:12px;">';
  html += _tInfoRow('Invoice Amount', _tmoney(invAmt), ' ' + _tTag('AUTO', '#D1FAE5', '#065F46'));
  html += _tInfoRow('Client', trip.client);
  html += '</div>';
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;">';
  html += '<div>' + _tLbl('Amount Received (₹)', true) + _tField('t-pay-amt', 'number', '', invAmt) + '</div>';
  html += '<div>' + _tLbl('Payment Mode', true) + _tSearchDropdownHtml('t-pay-mode-sd', TRIP_PAYMENT_MODES, 'Select mode...') + '</div>';
  html += '<div>' + _tLbl('UTR / Reference No.') + _tField('t-pay-ref', 'text', 'Transaction reference') + '</div>';
  html += '<div>' + _tLbl('Payment Date') + _tField('t-pay-date', 'date', '', _ttoday()) + '</div>';
  html += '</div>';
  html += _tBtn('t-pay-go', '✓ Record Payment', '#16A34A', false, false);
  html += '</div>';

  area.innerHTML = html;
  _tInitSearchDropdown('t-pay-mode-sd', TRIP_PAYMENT_MODES.map(function(m){ return {value:m,label:m}; }));

  document.getElementById('t-pay-go').addEventListener('click', function() {
    var modeHidden = document.querySelector('#t-pay-mode-sd .t-sd-value');
    var mode = modeHidden ? modeHidden.value : '';
    if (!mode) return;
    var ref = document.getElementById('t-pay-ref').value;
    var date = document.getElementById('t-pay-date').value || _ttoday();
    applyUpdate({ status:'Settled', paymentDate:date, paymentRef:ref });
  });
}
</script>
