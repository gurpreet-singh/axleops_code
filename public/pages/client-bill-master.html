<script>
// ─── SLIDER INFRASTRUCTURE ─────────────────────────────
function _bcCloseSlider() {
    var panel = document.getElementById('bc-slider-panel');
    if (panel) {
        panel.classList.add('closing');
        setTimeout(function() {
            var bd = document.getElementById('bc-slider-backdrop');
            if (bd) bd.remove();
            if (panel) panel.remove();
        }, 250);
    } else {
        var bd = document.getElementById('bc-slider-backdrop');
        if (bd) bd.remove();
    }
}

function _bcBuildSlider(title, subtitle, headerActions) {
    _bcCloseSlider();
    var bd = document.createElement('div');
    bd.id = 'bc-slider-backdrop';
    bd.className = 'bc-slider-backdrop';
    bd.addEventListener('click', function(e){ if(e.target===bd) _bcCloseSlider(); });

    var sl = document.createElement('div');
    sl.id = 'bc-slider-panel';
    sl.className = 'bc-slider-panel';

    // Header — ONLY identity + close button
    var hdr = document.createElement('div');
    hdr.className = 'bc-slider-header';
    hdr.innerHTML = '<div style="display:flex;align-items:center;justify-content:space-between;">'
        + '<div>'
        + '<div style="color:rgba(255,255,255,.65);font-size:10px;font-weight:700;letter-spacing:1.5px;margin-bottom:3px;">' + title.toUpperCase() + '</div>'
        + '<div style="color:#fff;font-size:16px;font-weight:800;">' + subtitle + '</div>'
        + '</div>'
        + '<button id="bc-slider-close" style="background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:8px;width:32px;height:32px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;">✕</button>'
        + '</div>';
    sl.appendChild(hdr);

    // ─── Action Bar — BELOW header, standardised ─────────────────────
    var actionBar = document.createElement('div');
    actionBar.className = 'sl-action-bar';
    var abLeft = '<div class="sl-action-bar-left">' + (headerActions || '') + '</div>';
    var abRight = '<div class="sl-action-bar-right"><button class="sl-edit-toggle-btn" id="bc-edit-toggle">✏️ Edit Details</button></div>';
    actionBar.innerHTML = abLeft + abRight;
    sl.appendChild(actionBar);

    var body = document.createElement('div');
    body.id = 'bc-slider-body';
    body.className = 'bc-slider-body';
    sl.appendChild(body);

    document.body.appendChild(bd);
    document.body.appendChild(sl);
    document.getElementById('bc-slider-close').addEventListener('click', _bcCloseSlider);
    document.addEventListener('keydown', function handler(e){
        if(e.key==='Escape'){ _bcCloseSlider(); document.removeEventListener('keydown',handler); }
    });

    // Wire Edit toggle
    var bcEditToggle = document.getElementById('bc-edit-toggle');
    if (bcEditToggle) {
        var bcEditing = false;
        bcEditToggle.addEventListener('click', function() {
            if (!bcEditing) {
                bcEditing = true;
                bcEditToggle.innerHTML = '✓ Save Details';
                bcEditToggle.classList.add('editing');
                if(window.showToast) showToast('Edit mode enabled', 'info');
            } else {
                bcEditing = false;
                bcEditToggle.innerHTML = '✏️ Edit Details';
                bcEditToggle.classList.remove('editing');
                if(window.showToast) showToast('Changes saved', 'success');
            }
        });
    }

    return body;
}

// ─── CLIENT AUTO-FILL ──────────────────────────────────
function cbmPopulateClient() {
    var sel = document.getElementById('cbm-client-name');
    var opt = sel.options[sel.selectedIndex];
    if (sel.value) {
        document.getElementById('cbm-state').value = opt.getAttribute('data-state') || '';
        document.getElementById('cbm-state-code').value = opt.getAttribute('data-code') || '';
    } else {
        document.getElementById('cbm-state').value = '';
        document.getElementById('cbm-state-code').value = '';
    }
}

// ─── TRIP STATEMENT MODAL ──────────────────────────────
function openTripStatementModal() {
    var overlay = document.getElementById('cbm-trip-modal-overlay');
    // Move modal to body so it renders above hidden page containers
    if (overlay && overlay.parentNode !== document.body) {
        document.body.appendChild(overlay);
    }
    var tbody = document.getElementById('cbm-modal-tbody');
    tbody.innerHTML = '';
    cbmTripStatements.forEach(function(t) {
        var isAdded = cbmAddedTrips.some(function(a) { return a.sr === t.sr; });
        var tr = document.createElement('tr');
        if (isAdded) tr.style.opacity = '0.4';
        tr.innerHTML =
            '<td style="padding:10px 12px;"><input type="checkbox" class="cbm-trip-check" data-sr="' + t.sr + '"' + (isAdded ? ' disabled checked' : '') + '></td>' +
            '<td style="padding:10px 12px;">' + t.sr + '</td>' +
            '<td style="padding:10px 12px;font-family:\'JetBrains Mono\',monospace;font-weight:600;">' + t.lr + '</td>' +
            '<td style="padding:10px 12px;">' + t.type + '</td>' +
            '<td style="padding:10px 12px;">' + t.vehicleType + '</td>' +
            '<td style="padding:10px 12px;font-size:11px;">' + t.invoiceNo + '</td>';
        tbody.appendChild(tr);
    });
    document.getElementById('cbm-trip-modal-overlay').style.display = 'block';
}

function closeTripStatementModal() {
    document.getElementById('cbm-trip-modal-overlay').style.display = 'none';
}

function cbmToggleAll(master) {
    var checks = document.querySelectorAll('.cbm-trip-check:not(:disabled)');
    checks.forEach(function(c) { c.checked = master.checked; });
}

function cbmAddSelectedTrips() {
    var checks = document.querySelectorAll('.cbm-trip-check:checked:not(:disabled)');
    checks.forEach(function(c) {
        var sr = parseInt(c.getAttribute('data-sr'));
        var trip = cbmTripStatements.find(function(t) { return t.sr === sr; });
        if (trip && !cbmAddedTrips.some(function(a) { return a.sr === sr; })) {
            cbmAddedTrips.push(trip);
        }
    });
    cbmRenderTripsTable();
    closeTripStatementModal();
    showToast(checks.length + ' trip(s) added to the bill', 'success');
}

function cbmRenderTripsTable() {
    var tbody = document.getElementById('cbm-trips-tbody');
    var empty = document.getElementById('cbm-empty-state');
    if (!tbody || !empty) return;
    tbody.innerHTML = '';
    if (cbmAddedTrips.length === 0) {
        empty.style.display = 'block';
        cbmRecalcTax();
        return;
    }
    empty.style.display = 'none';
    cbmAddedTrips.forEach(function(t, i) {
        var tr = document.createElement('tr');
        tr.innerHTML =
            '<td style="padding:10px 12px;">' + (i + 1) + '</td>' +
            '<td style="padding:10px 12px;font-family:\'JetBrains Mono\',monospace;font-weight:600;">' + t.lr + '</td>' +
            '<td style="padding:10px 12px;">' + t.lrDate + '</td>' +
            '<td style="padding:10px 12px;font-weight:600;">' + t.vehicleNo + '</td>' +
            '<td style="padding:10px 12px;">' + t.origin + '</td>' +
            '<td style="padding:10px 12px;">' + t.dest + '</td>' +
            '<td style="padding:10px 12px;">' + t.qty + '</td>';
        tbody.appendChild(tr);
    });
    var total = cbmAddedTrips.reduce(function(sum, t) { return sum + t.amount; }, 0);
    var taxEl = document.getElementById('cbm-taxable-amount');
    if (taxEl) taxEl.textContent = '₹' + total.toLocaleString('en-IN');
    cbmRecalcTax();
}

function cbmRecalcTax() {
    var taxEl = document.getElementById('cbm-taxable-amount');
    if (!taxEl) return;
    var taxable = parseInt((taxEl.textContent || '0').replace(/[₹,—]/g, '')) || 0;
    var cgstPct = parseFloat((document.getElementById('cbm-cgst-pct')||{}).value) || 0;
    var sgstPct = parseFloat((document.getElementById('cbm-sgst-pct')||{}).value) || 0;
    var igstPct = parseFloat((document.getElementById('cbm-igst-pct')||{}).value) || 0;
    var tdsPct = parseFloat((document.getElementById('cbm-tds-pct')||{}).value) || 0;
    var cgstAmt = Math.round(taxable * cgstPct / 100);
    var sgstAmt = Math.round(taxable * sgstPct / 100);
    var igstAmt = Math.round(taxable * igstPct / 100);
    var totalGst = cgstAmt + sgstAmt + igstAmt;
    var totalBeforeTds = taxable + totalGst;
    var tdsAmt = Math.round(totalBeforeTds * tdsPct / 100);
    var grandTotal = totalBeforeTds - tdsAmt;
    var fmt = function(v) { return '₹' + v.toLocaleString('en-IN'); };
    var s = function(id,v){ var el=document.getElementById(id); if(el) el.textContent = fmt(v); };
    s('cbm-cgst-amt',cgstAmt); s('cbm-sgst-amt',sgstAmt); s('cbm-igst-amt',igstAmt);
    s('cbm-total-gst',totalGst); s('cbm-total-before-tds',totalBeforeTds); s('cbm-grand-total',grandTotal);
    // TDS shows as a deduction
    var tdsEl = document.getElementById('cbm-tds-amt');
    if (tdsEl) tdsEl.textContent = '− ' + fmt(tdsAmt);
}

function cbmSwitchGstType(type) {
    var cgstRows = document.querySelectorAll('.cbm-tax-row-cgst');
    var sgstRows = document.querySelectorAll('.cbm-tax-row-sgst');
    var igstRows = document.querySelectorAll('.cbm-tax-row-igst');
    if (type === 'inter') {
        cgstRows.forEach(function(r){ r.style.display='none'; });
        sgstRows.forEach(function(r){ r.style.display='none'; });
        igstRows.forEach(function(r){ r.style.display='flex'; });
        // Reset CGST/SGST values
        var c = document.getElementById('cbm-cgst-pct'); if(c) c.value='';
        var s = document.getElementById('cbm-sgst-pct'); if(s) s.value='';
    } else {
        cgstRows.forEach(function(r){ r.style.display='flex'; });
        sgstRows.forEach(function(r){ r.style.display='flex'; });
        igstRows.forEach(function(r){ r.style.display='none'; });
        // Reset IGST value
        var i = document.getElementById('cbm-igst-pct'); if(i) i.value='';
    }
    cbmRecalcTax();
}

// Close modal on Escape
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
        var overlay = document.getElementById('cbm-trip-modal-overlay');
        if (overlay && overlay.style.display === 'block') closeTripStatementModal();
    }
});
