<!-- ═══════════════════════════════════════════════════════════════
     🚛 TRIP DASHBOARD — Consolidated Trip Overview
     Operations Domain: Full trip lifecycle at a glance
     ═══════════════════════════════════════════════════════════════ -->

<!-- ─── HEADER ─────────────────────────────────────────────────────── -->
<div class="page-header">
    <h1>Trip Dashboard <span class="learn-badge"><i class="fas fa-route" style="color:#059669;"></i> TMS</span></h1>
    <div class="page-header-actions">
        <button class="btn btn-primary" onclick="openDashAddTrip()"><i class="fas fa-plus"></i> New Trip</button>
    </div>
</div>

<!-- ─── LIFECYCLE STRIP ───────────────────────────────────────── -->
<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
    <div style="font-size:12px;font-weight:700;color:#059669;text-transform:uppercase;letter-spacing:0.8px;">Trip Lifecycle</div>
    <div style="flex:1;height:1px;background:linear-gradient(90deg,#A7F3D0,transparent);"></div>
</div>

<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;" id="trip-dash-lifecycle"></div>

<!-- ─── RECENT TRIPS TABLE ──────────────────────────────────────── -->
<div style="background:#fff;border:1.5px solid #E2E8F0;border-radius:16px;overflow:hidden;">
    <div style="padding:16px 20px;border-bottom:1px solid #E2E8F0;display:flex;align-items:center;justify-content:space-between;">
        <div style="font-size:15px;font-weight:800;color:#1E293B;">All Active Trips</div>
        <input id="trip-dash-search" placeholder="🔍 Search..." style="border:1.5px solid #E2E8F0;border-radius:10px;padding:7px 12px;font-size:12px;color:#1E293B;outline:none;width:200px;font-family:inherit;" />
    </div>
    <div id="trip-dash-table"></div>
</div>

<script>
(function() {
    function init() {
        if (typeof TRIPS_DATA === 'undefined' || typeof TRIP_STATE_COLORS === 'undefined') { setTimeout(init, 200); return; }

        var statusMeta = [
            { key:'Created', icon:'📝', label:'Created', sub:'Assign vehicle + driver', color:'#7C3AED' },
            { key:'In Transit', icon:'🚛', label:'In Transit', sub:'Tracking', color:'#0EA5E9' },
            { key:'Completed', icon:'✅', label:'Completed', sub:'POD + delivery done', color:'#10B981' },
            { key:'Settled', icon:'🔒', label:'Settled', sub:'Revenue locked', color:'#D97706' }
        ];

        // Lifecycle cards
        var lcEl = document.getElementById('trip-dash-lifecycle');
        if (lcEl) {
            var html = '';
            statusMeta.forEach(function(sm) {
                var count = TRIPS_DATA.filter(function(t){ return t.status === sm.key; }).length;
                var sc = TRIP_STATE_COLORS[sm.key] || {};
                html += '<button onclick="openDashTripSlider(\'' + sm.key + '\',\'ops\')" style="background:' + (sc.light||'#F8FAFC') + ';border:2px solid ' + (sc.border||'#E2E8F0') + ';border-radius:16px;padding:18px 16px;cursor:pointer;text-align:left;transition:all .15s;display:block;" onmouseenter="this.style.transform=\'translateY(-2px)\';this.style.boxShadow=\'0 6px 20px rgba(0,0,0,0.08)\';" onmouseleave="this.style.transform=\'none\';this.style.boxShadow=\'none\';">';
                html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">';
                html += '<span style="font-size:22px;">' + sm.icon + '</span>';
                html += '<span style="font-size:26px;font-weight:800;color:' + sm.color + ';">' + count + '</span></div>';
                html += '<div style="font-size:13px;font-weight:700;color:#1E293B;">' + sm.label + '</div>';
                html += '<div style="font-size:11px;color:#64748B;margin-top:2px;">' + sm.sub + '</div>';
                html += '<div style="margin-top:10px;font-size:11px;font-weight:700;color:' + sm.color + ';">View trips →</div></button>';
            });
            lcEl.innerHTML = html;
        }

        // Table
        function renderTable(q) {
            var active = TRIPS_DATA.filter(function(t){ return t.status !== 'Settled'; });
            if (q) {
                var ql = q.toLowerCase();
                active = active.filter(function(t){
                    return t.id.toLowerCase().indexOf(ql) >= 0 || t.lr.toLowerCase().indexOf(ql) >= 0 || t.client.toLowerCase().indexOf(ql) >= 0 || t.origin.toLowerCase().indexOf(ql) >= 0 || t.destination.toLowerCase().indexOf(ql) >= 0 || (t.vehicle||'').toLowerCase().indexOf(ql) >= 0;
                });
            }
            var tbl = document.getElementById('trip-dash-table');
            if (!tbl) return;
            var html = '<div style="display:grid;grid-template-columns:70px 80px 1.2fr 1fr 1fr 90px 80px 50px;padding:10px 20px;background:#F8FAFC;border-bottom:1px solid #E2E8F0;font-size:10px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.5px;">';
            html += '<span>ID</span><span>LR No.</span><span>Route</span><span>Client</span><span>Vehicle</span><span>Status</span><span>Freight</span><span></span></div>';
            if (active.length === 0) {
                html += '<div style="text-align:center;padding:32px;color:#94A3B8;font-size:13px;">No active trips</div>';
            } else {
                active.forEach(function(t) {
                    var sc = TRIP_STATE_COLORS[t.status] || {};
                    html += '<div class="trip-dash-row" data-trip-id="' + t.id + '" style="display:grid;grid-template-columns:70px 80px 1.2fr 1fr 1fr 90px 80px 50px;padding:12px 20px;border-bottom:1px solid #F8FAFC;align-items:center;cursor:pointer;transition:background .1s;" onmouseenter="this.style.background=\'#F8FAFC\'" onmouseleave="this.style.background=\'#fff\'">';
                    html += '<div style="font-size:11px;color:#94A3B8;font-family:monospace;">' + t.id + '</div>';
                    html += '<div style="font-size:11px;color:#475569;font-family:monospace;">' + t.lr + '</div>';
                    html += '<div style="font-size:12px;font-weight:700;color:#1E293B;">' + t.origin + ' → ' + t.destination + '</div>';
                    html += '<div style="font-size:12px;color:#475569;">' + t.client + '</div>';
                    html += '<div>' + (t.vehicle ? '<span style="font-size:11px;font-family:monospace;background:#F1F5F9;padding:2px 6px;border-radius:4px;">' + t.vehicle + '</span>' : '<span style="font-size:10px;color:#7C3AED;font-weight:700;">—</span>') + '</div>';
                    html += '<div><span style="background:' + (sc.mid||'#F1F5F9') + ';color:' + (sc.text||'#475569') + ';border:1px solid ' + (sc.border||'#E5E7EB') + ';font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;">' + t.status + '</span></div>';
                    html += '<div style="font-size:12px;font-weight:600;color:#1E293B;">₹' + (t.freight||0).toLocaleString() + '</div>';
                    html += '<div style="font-size:10px;color:#94A3B8;font-weight:700;text-align:right;">→</div></div>';
                });
            }
            tbl.innerHTML = html;
            tbl.querySelectorAll('.trip-dash-row').forEach(function(row) {
                row.addEventListener('click', function() {
                    var tripId = this.getAttribute('data-trip-id');
                    if (typeof openTripDetailById === 'function') openTripDetailById(tripId);
                });
            });
        }
        renderTable('');
        var si = document.getElementById('trip-dash-search');
        if (si) si.addEventListener('input', function(){ renderTable(this.value); });
    }
    init();
})();
</script>
