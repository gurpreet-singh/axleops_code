<!-- ═══════════════════════════════════════════════════════════════
     🛣️ ROUTES PAGE — Slider-Based UX
     Route = Client + Vehicle Type + Origin–Destination
     Click row → slider opens. Escape/backdrop → close. ↑↓ arrows navigate.
     ═══════════════════════════════════════════════════════════════ -->

<div class="page-header" style="font-family:'DM Sans',system-ui,sans-serif;">
    <h1 style="font-size:22px;font-weight:800;">Route Management</h1>
    <div class="page-header-actions">
        <button class="sl-btn default" id="route-export-btn"><i class="fas fa-file-export" style="margin-right:4px;"></i> Export</button>
        <button class="sl-btn primary" id="route-add-btn"><i class="fas fa-plus" style="margin-right:4px;"></i> Add Route</button>
    </div>
</div>

<!-- Metrics Row -->
<div id="route-metrics-row" style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;font-family:'DM Sans',system-ui,sans-serif;"></div>

<!-- Info Banner -->
<div style="background:#eff8ff;border:1px solid rgba(23,92,211,0.19);border-radius:8px;padding:8px 14px;margin-bottom:12px;font-size:10px;color:#175cd3;font-family:'DM Sans',system-ui,sans-serif;">
    <strong>Route = Client + Vehicle Type + Origin → Destination.</strong> Click any row to open route detail in the side panel. Use ↑↓ arrow keys to navigate between routes.
</div>

<!-- Filters -->
<div class="route-filters">
    <input type="text" id="route-search" placeholder="Search routes..." style="width:170px;">
    <select id="route-filter-client"><option value="all">Client ▾</option></select>
    <select id="route-filter-vt"><option value="all">Vehicle ▾</option></select>
    <select id="route-filter-tmpl"><option value="all">Template ▾</option></select>
    <div style="flex:1;"></div>
    <span id="route-count" style="font-size:10px;color:#98a2b3;"></span>
</div>

<!-- Table -->
<div style="background:#fff;border-radius:0 0 10px 10px;border:1px solid #e4e7ec;overflow:hidden;">
    <div style="overflow-x:auto;">
        <table class="route-table-enhanced">
            <thead><tr id="route-thead"></tr></thead>
            <tbody id="route-tbody"></tbody>
        </table>
    </div>
</div>

<div id="route-slider-container"></div>

/* ═══ STATE ═══ */
let selectedRoute=null, sliderMode="view", activeTab="overview";
let search="",clientF="all",vtF="all",tmplF="all";
let sort={key:"dist",dir:"desc"};

/* ═══ HELPERS ═══ */
function getFiltered(){
  let r=ROUTES.filter(rt=>
    (clientF==="all"||rt.client===clientF)&&
    (vtF==="all"||rt.vType===vtF)&&
    (tmplF==="all"||rt.template===tmplF)&&
    (search===""||rt.route.toLowerCase().includes(search.toLowerCase())||rt.client.toLowerCase().includes(search.toLowerCase())||rt.id.toLowerCase().includes(search.toLowerCase()))
  );
  if(sort.key){
    r=[...r].sort((a,b)=>{
      let va=a[sort.key],vb=b[sort.key];
      if(va==null)return 1;if(vb==null)return -1;
      if(typeof va==="string")return sort.dir==="asc"?va.localeCompare(vb):vb.localeCompare(va);
      return sort.dir==="asc"?va-vb:vb-va;
    });
  }
  return r;
}

/* ═══ RENDER METRICS ═══ */
function renderMetrics(){
  const el=document.getElementById("route-metrics-row");if(!el)return;
  const active=ROUTES.filter(r=>r.status==="Active").length;
  const adhoc=ROUTES.filter(r=>r.isAdhoc).length;
  const highRisk=ROUTES.filter(r=>r.risk>=5).length;
  const otArr=ROUTES.filter(r=>r.onTime!=null);
  const avgOT=otArr.length?Math.round(otArr.reduce((s,r)=>s+r.onTime,0)/otArr.length):0;
  el.innerHTML=[
    ["Total routes",ROUTES.length,""],["Active",active,T.green],["Ad-hoc",adhoc,T.amber,"Pending calibration"],
    ["High risk",highRisk,T.red,"Score ≥ 5"],["Avg on-time",avgOT+"%",T.green,""]
  ].map(([l,v,c,s])=>`<div class="sl-metric"><div class="sl-metric-label">${l}</div><div class="sl-metric-value" style="color:${c||T.ink}">${v}</div>${s?`<div class="sl-metric-sub">${s}</div>`:""}</div>`).join("");
}

/* ═══ RENDER FILTERS ═══ */
function renderFilters(){
  const cs=[...new Set(ROUTES.map(r=>r.client))].sort();
  const vs=[...new Set(ROUTES.map(r=>r.vType))].sort();
  document.getElementById("route-filter-client").innerHTML=`<option value="all">Client ▾</option>`+cs.map(c=>`<option value="${c}"${clientF===c?" selected":""}>${c}</option>`).join("");
  document.getElementById("route-filter-vt").innerHTML=`<option value="all">Vehicle ▾</option>`+vs.map(v=>`<option value="${v}"${vtF===v?" selected":""}>${v}</option>`).join("");
  document.getElementById("route-filter-tmpl").innerHTML=`<option value="all">Template ▾</option>`+["Standard","Express","Heavy Cargo","Hazmat"].map(t=>`<option value="${t}"${tmplF===t?" selected":""}>${t}</option>`).join("");
}

/* ═══ RENDER TABLE ═══ */
function renderTable(){
  const filtered=getFiltered();
  document.getElementById("route-count").textContent=`${filtered.length} of ${ROUTES.length} routes`;
  // Header
  const cols=[
    {l:"Client",k:"client"},{l:"Route",k:"route"},{l:"Vehicle",k:""},{l:"Template",k:""},{l:"Dist.",k:"dist",r:1},
    {l:"Est. time",k:""},{l:"Toll",k:"toll",r:1},{l:"Diesel",k:"",r:1},
    {l:"On-time",k:"onTime",r:1},{l:"Risk",k:"risk",r:1},{l:"Margin",k:"avgMargin",r:1},{l:"Status",k:""}
  ];
  document.getElementById("route-thead").innerHTML=cols.map(c=>{
    const active=sort.key===c.k;
    const arrow=c.k?`<span style="margin-left:2px;opacity:${active?1:.3}">${active?(sort.dir==="asc"?"▲":"▼"):"⇅"}</span>`:"";
    return `<th class="${active?"active":""} ${c.r?"right":""}" data-sort="${c.k||""}" style="${c.r?"text-align:right":""}">${c.l}${arrow}</th>`;
  }).join("");
  // Body
  document.getElementById("route-tbody").innerHTML=filtered.map((rt,idx)=>{
    const sel=selectedRoute&&selectedRoute.id===rt.id;
    const vtBadge=badge(rt.vType,vtC[rt.vType]||"gray",true);
    const tmBadge=badge(rt.template,tmC[rt.template]||"gray",true);
    const stBadge=badge(rt.status,rt.status==="Active"?"green":rt.status==="Ad-hoc"?"amber":"gray",true);
    const onTimeHtml=rt.onTime!=null?`<span style="font-size:11px;font-weight:700;color:${rt.onTime>=90?T.green:rt.onTime>=80?T.amber:T.red}">${rt.onTime}%</span>`:`<span style="color:${T.ink4}">—</span>`;
    const riskHtml=rt.risk!=null?`<div style="display:flex;align-items:center;gap:3px;justify-content:flex-end">${bar(rt.risk,10,riskC(rt.risk))}<span style="font-size:10px;font-weight:700;color:${riskC(rt.risk)}">${rt.risk.toFixed(1)}</span></div>`:`<span style="font-size:10px;color:${T.ink4}">N/A</span>`;
    const marginHtml=rt.avgMargin!=null?`<span style="font-size:11px;font-weight:700;color:${rt.avgMargin>=20?T.green:T.amber}">${rt.avgMargin}%</span>`:`<span style="color:${T.ink4}">—</span>`;
    const adhocHtml=rt.isAdhoc?`<div style="font-size:8px;color:${T.amberTx}">${rt.adhocTrips}/3</div>`:"";
    return `<tr class="${sel?"selected":""}" data-id="${rt.id}" style="${!sel&&idx%2?`background:${T.bdr2}40`:""}">
      <td style="font-weight:600;color:${T.blue};${sel?"border-left:3px solid "+T.blue:""}">${rt.client}</td>
      <td><div style="font-weight:600;font-size:12px;color:${T.blue}">${rt.route}</div><div style="font-size:8px;color:${T.ink4}">${rt.via} ${badge(rt.sc,"gray",true)}</div></td>
      <td>${vtBadge}</td><td>${tmBadge}</td>
      <td style="font-family:${MN};font-size:11px;font-weight:600;text-align:right">${rt.dist.toLocaleString()}</td>
      <td style="font-size:11px;color:${T.ink3}">${rt.estTime}</td>
      <td style="font-family:${MN};font-size:11px;font-weight:600;text-align:right;color:${T.coral}">${INR(rt.toll)}</td>
      <td style="font-size:11px;font-weight:600;text-align:right;color:${T.green}">${rt.diesel}L</td>
      <td style="text-align:right">${onTimeHtml}</td>
      <td style="text-align:right">${riskHtml}</td>
      <td style="text-align:right">${marginHtml}</td>
      <td>${stBadge}${adhocHtml}</td>
    </tr>`;
  }).join("");
}

/* ═══ SLIDER CONTENT BUILDERS ═══ */

function tabOverview(rt){return tabRouteForm(rt);}
function tabOldOverview(rt){
  const dieselCost=Math.round(rt.diesel*89.6);

        <button class="slider-close-btn" id="slider-close-btn">&times;</button>
      </div>
      ${!isCreate?`<div class="slider-tabs">${tabs.map(t=>`<button class="slider-tab${activeTab===t.id?" active":""}" data-tab="${t.id}">${t.l}${t.cnt!=null?`<span class="tab-count">${t.cnt}</span>`:""}</button>`).join("")}</div>`:""}
      <div class="slider-body">${bodyContent}</div>
    </div>`;

  // Attach slider events
  document.getElementById("slider-backdrop").onclick=closeSlider;
  document.getElementById("slider-close-btn").onclick=closeSlider;
  // Tab clicks only swap body content — no full re-render
  c.querySelectorAll(".slider-tab").forEach(btn=>btn.onclick=function(){activeTab=this.dataset.tab;updateTabContent();});

  const saveBtn=document.getElementById("slider-save-btn");
  if(saveBtn)saveBtn.onclick=function(){sliderMode="view";renderSlider();if(window.showToast)showToast("Route saved successfully","success");};
  const createBtn=document.getElementById("slider-create-btn");
  if(createBtn)createBtn.onclick=function(){closeSlider();if(window.showToast)showToast("Route added successfully","success");};
}

function openSlider(rt){selectedRoute=rt;sliderMode="edit";activeTab="overview";renderSlider();renderTable();}
function closeSlider(){selectedRoute=null;sliderMode="view";document.getElementById("route-slider-container").innerHTML="";renderTable();}

/* ═══ EVENT BINDINGS ═══ */
function bindEvents(){
  // Table row click
  document.getElementById("route-tbody").addEventListener("click",function(e){
    const row=e.target.closest("tr[data-id]");
    if(!row)return;
    const rt=ROUTES.find(r=>r.id===row.dataset.id);
    if(rt)openSlider(rt);
  });
  // Sort headers
  document.getElementById("route-thead").addEventListener("click",function(e){
    const th=e.target.closest("th[data-sort]");
    if(!th||!th.dataset.sort)return;
    const k=th.dataset.sort;
    sort=sort.key===k&&sort.dir==="asc"?{key:k,dir:"desc"}:{key:k,dir:"asc"};
    renderTable();
  });
  // Filters
  document.getElementById("route-search").addEventListener("input",function(){search=this.value;renderTable();});
  document.getElementById("route-filter-client").addEventListener("change",function(){clientF=this.value;renderTable();});
  document.getElementById("route-filter-vt").addEventListener("change",function(){vtF=this.value;renderTable();});
  document.getElementById("route-filter-tmpl").addEventListener("change",function(){tmplF=this.value;renderTable();});
  // Add route button
  document.getElementById("route-add-btn").addEventListener("click",function(){
    selectedRoute={id:"NEW",client:"",route:"New Route",via:"",sc:"",origin:"",originPin:"",dest:"",destPin:"",vType:"",dist:0,estTime:"",toll:0,diesel:0,kmpl:0,trips:0,tripsMtd:0,contracts:0,branch:"",template:"Standard",risk:null,onTime:null,avgMargin:null,status:"Draft",revenue:0,avgProfit:0,loadInstr:"",unloadInstr:""};
    sliderMode="create";activeTab="overview";renderSlider();
  });
  // Keyboard: Escape & Arrow keys
  document.addEventListener("keydown",function(e){
    if(!selectedRoute)return;
    if(e.key==="Escape"){e.preventDefault();closeSlider();return;}
    const filtered=getFiltered();
    const idx=filtered.findIndex(r=>r.id===selectedRoute.id);
    if(e.key==="ArrowDown"&&idx<filtered.length-1){e.preventDefault();selectedRoute=filtered[idx+1];renderSlider();renderTable();}
    if(e.key==="ArrowUp"&&idx>0){e.preventDefault();selectedRoute=filtered[idx-1];renderSlider();renderTable();}
  });
}

/* ═══ INIT ═══ */
renderMetrics();
renderFilters();
renderTable();
bindEvents();
})();
</script>
