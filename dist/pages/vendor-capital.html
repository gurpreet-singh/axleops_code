<!-- WRK-02: Vendor Working Capital Dashboard -->
<div class="page-header">
    <h1>Vendor Working Capital</h1>
    <div class="page-header-actions">
        <button class="btn btn-secondary"><i class="fas fa-download"></i> Export</button>
        <button class="btn btn-primary"><i class="fas fa-plus"></i> Add Vendor</button>
    </div>
</div>

<!-- Summary Metrics -->
<div class="stats-row" style="grid-template-columns:repeat(5,1fr);">
    <div class="stat-card">
        <div class="stat-label">Total Outstanding</div>
        <div class="stat-value text-red">₹3,42,600</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Within Terms</div>
        <div class="stat-value text-green">₹2,18,400</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Overdue</div>
        <div class="stat-value text-red">₹1,24,200</div>
        <div class="stat-change negative">3 vendors</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Open PO Value</div>
        <div class="stat-value" style="color:#7A5AF8;">₹93,200</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Avg Payment Cycle</div>
        <div class="stat-value text-blue">28 days</div>
    </div>
</div>

<!-- Vendor Table -->
<div class="table-container">
    <div class="table-toolbar" id="vc-toolbar">
        <div class="search-input"><i class="fas fa-search"></i><input type="text" placeholder="Search vendors..." id="vc-search" oninput="filterVcTable()"></div>
        <select id="vc-terms-filter" onchange="filterVcTable()" style="font-size:13px;padding:6px 12px;border-radius:6px;border:1px solid var(--border-color);background:var(--bg-white);font-family:inherit;">
            <option value="all">Payment Terms ▾</option>
            <option value="Immediate">Immediate</option>
            <option value="Net 15 days">Net 15 days</option>
            <option value="Net 30 days">Net 30 days</option>
            <option value="Net 45 days">Net 45 days</option>
            <option value="Net 60 days">Net 60 days</option>
        </select>
        <select id="vc-status-filter" onchange="filterVcTable()" style="font-size:13px;padding:6px 12px;border-radius:6px;border:1px solid var(--border-color);background:var(--bg-white);font-family:inherit;">
            <option value="all">Status ▾</option>
            <option value="overdue">Overdue</option>
            <option value="clear">Clear</option>
        </select>
        <div class="pagination-info"><span id="vc-count">1 – 8 of 8</span></div>
    </div>
    <div style="overflow-x:auto;">
        <table id="vc-table">
            <thead>
                <tr>
                    <th>Vendor</th>
                    <th>Payment Terms</th>
                    <th style="text-align:right;">Open POs</th>
                    <th style="text-align:right;">Outstanding</th>
                    <th style="text-align:right;">Within Terms</th>
                    <th style="text-align:right;">Overdue</th>
                    <th style="text-align:right;">Total Capital Stuck</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="vc-tbody"></tbody>
        </table>
    </div>
</div>

<script>
(function(){
    const VENDORS = [
        {name:"CEAT Tyre Zone",terms:"Net 45 days",openPo:74000,outstanding:138450,withinTerms:138450,overdue:0,totalStuck:212450},
        {name:"Boodmo Auto Parts",terms:"Net 15 days",openPo:0,outstanding:42600,withinTerms:18400,overdue:24200,totalStuck:42600},
        {name:"Castrol India",terms:"Net 30 days",openPo:0,outstanding:86200,withinTerms:0,overdue:86200,totalStuck:86200},
        {name:"Gulf Oil India",terms:"Immediate",openPo:0,outstanding:0,withinTerms:0,overdue:0,totalStuck:0},
        {name:"Sai Hardware",terms:"Immediate",openPo:0,outstanding:0,withinTerms:0,overdue:0,totalStuck:0},
        {name:"Gates India",terms:"Net 30 days",openPo:0,outstanding:32400,withinTerms:32400,overdue:0,totalStuck:32400},
        {name:"Exide Industries",terms:"Net 60 days",openPo:19200,outstanding:42950,withinTerms:29150,overdue:13800,totalStuck:62150},
        {name:"Rane Holdings",terms:"Net 45 days",openPo:0,outstanding:0,withinTerms:0,overdue:0,totalStuck:0}
    ];

    const INR = n => n == null ? '—' : (n === 0 ? '₹0' : '₹' + Math.abs(n).toLocaleString('en-IN'));
    const termsBadge = t => {
        const colors = {'Immediate':['#ecfdf3','#027a48'],'Net 15 days':['#eff8ff','#175cd3'],'Net 30 days':['#fffaeb','#b54708'],'Net 45 days':['#f4f3ff','#5925dc'],'Net 60 days':['#fef3f2','#b42318']};
        const c = colors[t] || ['#f2f4f7','#667085'];
        return `<span class="status-badge" style="background:${c[0]};color:${c[1]};font-size:11px;font-weight:600;">${t}</span>`;
    };

    function render() {
        const search = (document.getElementById('vc-search')?.value || '').toLowerCase();
        const tf = document.getElementById('vc-terms-filter')?.value || 'all';
        const sf = document.getElementById('vc-status-filter')?.value || 'all';
        let d = VENDORS.filter(v =>
            (tf === 'all' || v.terms === tf) &&
            (sf === 'all' || (sf === 'overdue' ? v.overdue > 0 : v.overdue === 0)) &&
            (search === '' || v.name.toLowerCase().includes(search))
        );
        const tbody = document.getElementById('vc-tbody');
        if (!tbody) return;
        document.getElementById('vc-count').textContent = `1 – ${d.length} of ${d.length}`;
        tbody.innerHTML = d.map(v => {
            const isOverdue = v.overdue > 0;
            return `<tr>
                <td><a href="javascript:void(0);" style="font-weight:600;">${v.name}</a></td>
                <td>${termsBadge(v.terms)}</td>
                <td style="text-align:right;font-family:'JetBrains Mono',monospace;color:${v.openPo > 0 ? '#7A5AF8' : 'var(--text-muted)'};">${INR(v.openPo)}</td>
                <td style="text-align:right;font-family:'JetBrains Mono',monospace;font-weight:600;">${INR(v.outstanding)}</td>
                <td style="text-align:right;font-family:'JetBrains Mono',monospace;color:var(--status-active);">${INR(v.withinTerms)}</td>
                <td style="text-align:right;font-family:'JetBrains Mono',monospace;color:${isOverdue ? 'var(--status-overdue)' : 'var(--text-muted)'};font-weight:${isOverdue ? '700' : '400'};">${INR(v.overdue)}</td>
                <td style="text-align:right;font-family:'JetBrains Mono',monospace;font-weight:700;color:${v.totalStuck > 0 ? 'var(--status-overdue)' : 'var(--text-primary)'};">${INR(v.totalStuck)}</td>
                <td>${isOverdue ? '<button class="btn btn-danger" style="font-size:12px;padding:4px 12px;" onclick="showToast(\'Payment initiated for '+v.name+'\',\'success\')">Pay now</button>' : ''}</td>
            </tr>`;
        }).join('');
    }

    window.filterVcTable = render;
    setTimeout(render, 50);
})();
</script>
